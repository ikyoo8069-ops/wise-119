:root{
  --red:#E53E3E;--red2:#C53030;--orange:#DD6B20;--amber:#D69E2E;
  --blue:#3182CE;--teal:#2C7A7B;--green:#276749;--gray9:#1A202C;
  --gray8:#2D3748;--gray7:#4A5568;--gray5:#718096;--gray3:#CBD5E0;
  --gray1:#F7FAFC;--white:#FFFFFF;
  --card-bg:#FFFFFF;--body-bg:#F0F4F8;
  --shadow:0 2px 8px rgba(0,0,0,.12);
  --radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--body-bg);color:var(--gray9);min-height:100vh;}
#root{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--white);}

/* ── HEADER ── */
.hdr{background:linear-gradient(135deg,#C53030 0%,#E53E3E 60%,#DD6B20 100%);
  color:#fff;padding:14px 16px 12px;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 8px rgba(200,30,30,.35);}
.hdr-top{display:flex;align-items:center;justify-content:space-between;}
.hdr-logo{font-size:1.25rem;font-weight:900;letter-spacing:-.5px;}
.hdr-logo span{opacity:.75;font-weight:400;font-size:.85rem;margin-left:6px;}
.hdr-actions{display:flex;gap:8px;align-items:center;}
.lang-sel{background:rgba(255,255,255,.18);border:none;color:#fff;
  border-radius:20px;padding:4px 10px;font-size:.8rem;cursor:pointer;
  appearance:none;-webkit-appearance:none;}
.lang-sel option{color:#000;}
.icon-btn{background:rgba(255,255,255,.18);border:none;color:#fff;
  width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:1rem;
  display:flex;align-items:center;justify-content:center;}
.dis-tabs{display:flex;gap:6px;margin-top:10px;overflow-x:auto;padding-bottom:2px;}
.dis-tabs::-webkit-scrollbar{display:none;}
.dis-tab{background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.3);
  color:#fff;border-radius:20px;padding:5px 13px;font-size:.78rem;
  cursor:pointer;white-space:nowrap;transition:.15s;}
.dis-tab.active,.dis-tab:hover{background:rgba(255,255,255,.95);color:var(--red);
  border-color:transparent;font-weight:700;}

/* ── BODY TABS ── */
.body-tabs{display:flex;border-bottom:2px solid var(--gray3);background:#fff;
  position:sticky;top:95px;z-index:90;}
.body-tab{flex:1;padding:10px 4px;text-align:center;font-size:.8rem;
  color:var(--gray5);border-bottom:3px solid transparent;cursor:pointer;
  transition:.15s;margin-bottom:-2px;}
.body-tab.active{color:var(--red);border-bottom-color:var(--red);font-weight:700;}

/* ── CHAT ── */
.chat-area{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:10px;min-height:300px;}
.msg{max-width:88%;display:flex;flex-direction:column;gap:3px;}
.msg.bot{align-self:flex-start;}
.msg.user{align-self:flex-end;}
.msg-bubble{padding:10px 14px;border-radius:18px;font-size:.88rem;line-height:1.55;}
.msg.bot .msg-bubble{background:var(--gray1);border-bottom-left-radius:4px;}
.msg.user .msg-bubble{background:var(--red);color:#fff;border-bottom-right-radius:4px;}
.msg-time{font-size:.7rem;color:var(--gray5);padding:0 4px;}
.msg.user .msg-time{text-align:right;}

/* Result cards */
.result-card{background:var(--gray1);border-radius:var(--radius);padding:12px;margin-top:4px;border-left:4px solid var(--red);}
.result-card h4{font-size:.82rem;color:var(--red);margin-bottom:8px;font-weight:700;}
.step-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:7px;}
.step-badge{background:var(--red);color:#fff;border-radius:8px;padding:2px 8px;
  font-size:.7rem;font-weight:700;white-space:nowrap;margin-top:1px;}
.step-text{font-size:.82rem;line-height:1.5;}
.law-tag{display:inline-flex;align-items:center;gap:3px;background:#EBF8FF;
  color:var(--blue);border:1px solid #BEE3F8;border-radius:6px;
  padding:2px 7px;font-size:.7rem;margin-top:3px;cursor:pointer;}

/* Accordion KB */
.kb-section{margin-top:8px;}
.kb-toggle{display:flex;align-items:center;justify-content:space-between;
  background:var(--gray1);border:1px solid var(--gray3);border-radius:8px;
  padding:8px 12px;cursor:pointer;font-size:.82rem;font-weight:600;}
.kb-body{border:1px solid var(--gray3);border-top:none;border-radius:0 0 8px 8px;
  padding:10px;display:none;}
.kb-body.open{display:block;}
.kb-item{display:flex;justify-content:space-between;align-items:center;
  padding:5px 0;border-bottom:1px solid #EDF2F7;font-size:.8rem;}
.kb-item:last-child{border:none;}
.ask-btn{background:var(--teal);color:#fff;border:none;border-radius:6px;
  padding:3px 8px;font-size:.7rem;cursor:pointer;white-space:nowrap;}

/* Chat input */
.chat-input-wrap{padding:10px 12px;border-top:1px solid var(--gray3);background:#fff;display:flex;flex-direction:column;gap:8px;}
.input-row{display:flex;gap:8px;align-items:flex-end;}
.chat-input{flex:1;border:1.5px solid var(--gray3);border-radius:24px;
  padding:9px 16px;font-size:.88rem;font-family:inherit;resize:none;
  max-height:100px;outline:none;transition:.15s;}
.chat-input:focus{border-color:var(--red);}
.send-btn{background:var(--red);color:#fff;border:none;border-radius:50%;
  width:42px;height:42px;cursor:pointer;font-size:1.1rem;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;transition:.1s;}
.send-btn:disabled{background:var(--gray3);}
.attach-row{display:flex;gap:6px;}
.attach-btn{background:var(--gray1);border:1px solid var(--gray3);border-radius:20px;
  padding:5px 12px;font-size:.75rem;cursor:pointer;color:var(--gray7);}
.attach-btn:hover{background:var(--gray3);}

/* ── EXPERT LIST ── */
.expert-grid{padding:12px;}
.expert-card{background:#fff;border:1px solid var(--gray3);border-radius:var(--radius);
  padding:12px;margin-bottom:10px;cursor:pointer;transition:.15s;
  display:flex;align-items:center;gap:12px;}
.expert-card:hover{border-color:var(--teal);box-shadow:var(--shadow);}
.expert-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--green));
  display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:1.1rem;flex-shrink:0;}
.expert-info{flex:1;}
.expert-name{font-weight:700;font-size:.9rem;}
.expert-spec{font-size:.77rem;color:var(--teal);margin-top:2px;}
.expert-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px;}
.expert-tag{background:#E6FFFA;color:var(--teal);border-radius:4px;padding:1px 6px;font-size:.68rem;}
.expert-avail{font-size:.7rem;color:var(--green);font-weight:600;}

/* ── FEEDBACK LIST ── */
.fb-list{padding:12px;}
.fb-item{background:#fff;border:1px solid var(--gray3);border-radius:var(--radius);
  padding:12px;margin-bottom:10px;}
.fb-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.fb-score{display:flex;gap:4px;}
.score-dot{width:10px;height:10px;border-radius:50%;background:var(--gray3);}
.score-dot.filled{background:var(--amber);}
.fb-detail{font-size:.8rem;color:var(--gray7);line-height:1.5;}
.rnd-badge{background:#FFF5F5;border:1px solid #FED7D7;border-radius:6px;
  padding:4px 10px;font-size:.75rem;color:var(--red);margin-top:6px;display:inline-block;}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal-sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;
  padding:20px;max-height:80vh;overflow-y:auto;animation:slideUp .25s ease;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-handle{width:40px;height:4px;background:var(--gray3);border-radius:2px;
  margin:0 auto 16px;}
.modal-title{font-size:1rem;font-weight:700;margin-bottom:4px;}
.modal-sub{font-size:.8rem;color:var(--gray5);margin-bottom:16px;}
.modal-expert-card{background:var(--gray1);border-radius:10px;padding:14px;
  display:flex;gap:12px;margin-bottom:16px;}
.step-indicator{display:flex;gap:6px;margin-bottom:16px;}
.step-dot{width:28px;height:4px;border-radius:2px;background:var(--gray3);}
.step-dot.done{background:var(--red);}
.fb-btn-row{display:flex;gap:10px;}
.fb-btn{flex:1;padding:14px;border-radius:12px;border:2px solid var(--gray3);
  cursor:pointer;font-size:.9rem;background:#fff;transition:.15s;text-align:center;}
.fb-btn.good:hover,.fb-btn.good.sel{border-color:var(--green);background:#F0FFF4;color:var(--green);}
.fb-btn.bad:hover,.fb-btn.bad.sel{border-color:var(--red);background:#FFF5F5;color:var(--red);}
.issue-chips{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0;}
.issue-chip{padding:7px 14px;border-radius:20px;border:1.5px solid var(--gray3);
  font-size:.82rem;cursor:pointer;transition:.15s;}
.issue-chip.sel{border-color:var(--red);background:#FFF5F5;color:var(--red);font-weight:600;}
.modal-confirm-btn{width:100%;background:var(--red);color:#fff;border:none;
  border-radius:12px;padding:14px;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:12px;}
.modal-close{position:absolute;right:20px;top:20px;background:none;border:none;
  font-size:1.3rem;cursor:pointer;color:var(--gray5);}

/* ── HISTORY ── */
.hist-list{padding:12px;}
.hist-item{background:#fff;border:1px solid var(--gray3);border-radius:var(--radius);
  padding:12px;margin-bottom:10px;cursor:pointer;transition:.15s;}
.hist-item:hover{border-color:var(--red);}
.hist-dis{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
.hist-dis-badge{background:var(--red);color:#fff;border-radius:6px;padding:2px 8px;font-size:.72rem;}
.hist-q{font-size:.85rem;font-weight:600;margin-bottom:3px;}
.hist-date{font-size:.72rem;color:var(--gray5);}

/* ── LOADING ── */
.typing{display:flex;gap:4px;padding:10px 14px;background:var(--gray1);
  border-radius:18px;border-bottom-left-radius:4px;align-self:flex-start;}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--gray5);
  animation:bounce .9s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}
.typing span:nth-child(3){animation-delay:.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}

/* scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--gray3);border-radius:2px;}

.empty-state{text-align:center;padding:40px 20px;color:var(--gray5);}
.empty-state .icon{font-size:3rem;margin-bottom:12px;}
.empty-state p{font-size:.88rem;line-height:1.6;}
</style>

/* helper */
function timeStr(){
  const d=new Date();
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}

/* Accordion for KB */
function KBAccordion({t, kb, onAsk}){
  const [open,setOpen]=useState({pat:false,pap:false,law:false});
  const tog=k=>setOpen(p=>({...p,[k]:!p[k]}));
  return(
    <div className="kb-section">
      {/* Patents */}
      <div className="kb-toggle" onClick={()=>tog('pat')}>
        <span>{t.kbPatent} ({kb.patents.length})</span><span>{open.pat?'▲':'▼'}</span>
      </div>
      <div className={`kb-body${open.pat?' open':''}`}>
        {kb.patents.map(p=>(
          <div className="kb-item" key={p.id}>
            <div>
              <div style={{fontWeight:600}}>{p.title}</div>
              <div style={{fontSize:'.72rem',color:'var(--gray5)'}}>{p.applicant}</div>
            </div>
            <button className="ask-btn" onClick={()=>onAsk(p)}>{t.askExpert}</button>
          </div>
        ))}
      </div>
      {/* Papers */}
      <div className="kb-toggle" style={{marginTop:6}} onClick={()=>tog('pap')}>
        <span>{t.kbPaper} ({kb.papers.length})</span><span>{open.pap?'▲':'▼'}</span>
      </div>
      <div className={`kb-body${open.pap?' open':''}`}>
        {kb.papers.map(p=>(
          <div className="kb-item" key={p.id}>
            <div>
              <div style={{fontWeight:600}}>{p.title}</div>
              <div style={{fontSize:'.72rem',color:'var(--gray5)'}}>{p.journal}</div>
            </div>
            <button className="ask-btn" onClick={()=>onAsk(p)}>{t.askExpert}</button>
          </div>
        ))}
      </div>
      {/* Laws */}
      <div className="kb-toggle" style={{marginTop:6}} onClick={()=>tog('law')}>
        <span>{t.kbLaw} ({kb.laws.length})</span><span>{open.law?'▲':'▼'}</span>
      </div>
      <div className={`kb-body${open.law?' open':''}`}>
        {kb.laws.map(l=>(
          <div className="kb-item" key={l.id}>
            <div>
              <div style={{fontWeight:600}}>{l.title}</div>
              <div style={{fontSize:'.72rem',color:'var(--gray5)'}}>{l.desc}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* Expert connect modal */
function ExpertModal({t, disaster, item, onClose, onFeedbackSaved}){
  const [step,setStep]=useState(1);
  const [rating,setRating]=useState(null);
  const [issues,setIssues]=useState([]);
  const candidates=EXPERTS.filter(e=>e.disasters.includes(disaster)).slice(0,3);
  const expert=candidates[0]||EXPERTS[0];

  function toggleIssue(i){
    setIssues(p=>p.includes(i)?p.filter(x=>x!==i):[...p,i]);
  }
  function submitFeedback(){
    const fb={
      id:'FB-'+Date.now(),
      disaster,
      expertId:expert.id,
      expertName:expert.name,
      item:item?.title||'',
      rating,
      issues,
      rnd: rating==='bad'&&issues.includes('정보')||issues.includes('information')||issues.includes('情報'),
      date:new Date().toLocaleDateString('ko-KR'),
    };
    try{
      const prev=JSON.parse(localStorage.getItem('fbDB')||'[]');
      localStorage.setItem('fbDB',JSON.stringify([fb,...prev]));
    }catch(e){}
    onFeedbackSaved(fb);
    setStep(4);
  }

  return(
    <div className="modal-overlay" onClick={e=>e.target.className==='modal-overlay'&&onClose()}>
      <div className="modal-sheet">
        <div className="modal-handle"/>
        <div className="modal-title">{t.expertTitle}</div>
        <div className="modal-sub">{disaster} · {item?.title}</div>
        {/* step indicator */}
        <div className="step-indicator">
          {[1,2,3,4].map(s=>(
            <div key={s} className={`step-dot${step>=s?' done':''}`}/>
          ))}
        </div>

        {step===1&&(
          <div>
            <div className="modal-expert-card">
              <div className="expert-avatar">{expert.name[0]}</div>
              <div className="expert-info">
                <div className="expert-name">{expert.name} {t.available} ✅</div>
                <div className="expert-spec">{expert.spec}</div>
                <div style={{fontSize:'.75rem',color:'var(--gray5)',marginTop:4}}>
                  {expert.area} · 경력 {expert.exp}년 · {expert.id}
                </div>
                <div className="expert-tags">
                  {expert.disasters.map(d=>(
                    <span key={d} className="expert-tag">{d}</span>
                  ))}
                </div>
              </div>
            </div>
            <button className="modal-confirm-btn" onClick={()=>setStep(2)}>상담 연결 →</button>
          </div>
        )}

        {step===2&&(
          <div>
            <div style={{fontWeight:700,marginBottom:12}}>{t.fbTitle}</div>
            <div className="fb-btn-row">
              <div className={`fb-btn good${rating==='good'?' sel':''}`} onClick={()=>{setRating('good');setStep(4);submitFeedback();}}>
                {t.fbGood}
              </div>
              <div className={`fb-btn bad${rating==='bad'?' sel':''}`} onClick={()=>{setRating('bad');setStep(3);}}>
                {t.fbBad}
              </div>
            </div>
          </div>
        )}

        {step===3&&(
          <div>
            <div style={{fontWeight:700,marginBottom:8}}>미흡한 부분을 선택하세요</div>
            <div className="issue-chips">
              {t.fbIssues.map(i=>(
                <div key={i} className={`issue-chip${issues.includes(i)?' sel':''}`}
                  onClick={()=>toggleIssue(i)}>{i}</div>
              ))}
            </div>
            <button className="modal-confirm-btn" onClick={submitFeedback}>{t.fbConfirm}</button>
          </div>
        )}

        {step===4&&(
          <div style={{textAlign:'center',padding:'20px 0'}}>
            <div style={{fontSize:'2.5rem',marginBottom:12}}>✅</div>
            <div style={{fontWeight:700,fontSize:'1rem',marginBottom:8}}>{t.fbDone}</div>
            {rating==='bad'&&issues.length>0&&(
              <div className="rnd-badge">{t.rndSuggest}: {disaster} 분야</div>
            )}
            <button className="modal-confirm-btn" style={{marginTop:16}} onClick={onClose}>
              {t.expertClose}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

  const [history,setHistory]=useState([]);

  // 초기 웰컴 메시지
  useEffect(()=>{
    setMessages([{role:'bot',text:t.welcome,time:timeStr()}]);
  },[lang]);

  // 피드백 로드
  useEffect(()=>{
    try{
      const fb=JSON.parse(localStorage.getItem('fbDB')||'[]');

    }catch(e){}
  },[]);

  // 스크롤
  useEffect(()=>{
    if(chatRef.current) chatRef.current.scrollTop=chatRef.current.scrollHeight;
  },[messages,loading]);

  const CLAUDE_API='https://api.anthropic.com/v1/messages';

  async function sendMessage(){

    const userMsg={role:'user',text:input,time:timeStr()};

    setInput('');
    setLoading(true);

    const kb=KB[disaster]||KB['홍수'];
    const patentList=kb.patents.map(p=>`[${p.id}] ${p.title} (${p.applicant})`).join('\n');
    const paperList=kb.papers.map(p=>`[${p.id}] ${p.title} - ${p.journal}`).join('\n');
    const lawList=kb.laws.map(l=>`[${l.id}] ${l.title}: ${l.desc}`).join('\n');

    const system=`당신은 재난 대응 전문 AI입니다. 재난 유형: ${disaster}
응답 언어: ${lang==='ko'?'한국어':lang==='en'?'English':lang==='ja'?'日本語':lang==='zh'?'中文':'Tiếng Việt'}

지식 DB (출처 명시 필수):
=특허=
${patentList}
=논문=
${paperList}
=법령=
${lawList}

응답 형식 (반드시 준수):
##ACTION: 즉각 행동 1~2문장
##MEASURE: 조치사항 (법령 출처 포함) 2~3개
##EXPERT: 추천 전문가 분야
##RND: R&D 필요 여부와 방향`;

    try{
      const res=await fetch(CLAUDE_API,{
        method:'POST',
        headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514',
          max_tokens:1000,
          system,
          messages:[{role:'user',content:input}]
        })
      });
      const data=await res.json();
      const text=data.content?.[0]?.text||'응답을 받지 못했습니다.';
      const botMsg={role:'bot',text,time:timeStr(),isResult:true,disaster,kb};
      setMessages(p=>[...p,botMsg]);
      // 이력 저장
      const hi={id:'H-'+Date.now(),disaster,question:input,date:new Date().toLocaleDateString('ko-KR'),answer:text};
      setHistory(p=>[hi,...p]);
    }catch(e){
      setMessages(p=>[...p,{role:'bot',text:'API 연결 오류. API Key를 확인하세요.',time:timeStr()}]);
    }
    setLoading(false);
  }

  function onAsk(item){
    setModal({item,disaster});
  }

  function onFeedbackSaved(fb){
    setFeedbacks(p=>[fb,...p]);
  }

  /* render result bubble */
  function ResultBubble({msg}){
    const kb=msg.kb||KB[msg.disaster]||KB['홍수'];
    const lines=msg.text.split('\n');
    const sections={ACTION:[],MEASURE:[],EXPERT:[],RND:[]};
    let cur=null;
    lines.forEach(l=>{
      if(l.startsWith('##ACTION')) cur='ACTION';
      else if(l.startsWith('##MEASURE')) cur='MEASURE';
      else if(l.startsWith('##EXPERT')) cur='EXPERT';
      else if(l.startsWith('##RND')) cur='RND';
      else if(cur&&l.trim()) sections[cur].push(l.trim());
    });

    const hasStruct=Object.values(sections).some(v=>v.length>0);

    return(
      <div className="result-card">
        <h4>🚨 {msg.disaster} 대응 분석</h4>
        {hasStruct?(
          <>
            {sections.ACTION.length>0&&(
              <div className="step-row">
                <div className="step-badge">{t.steps[0]}</div>
                <div className="step-text">{sections.ACTION.join(' ')}</div>
              </div>
            )}
            {sections.MEASURE.length>0&&(
              <div className="step-row">
                <div className="step-badge" style={{background:'var(--blue)'}}>{t.steps[1]}</div>
                <div className="step-text">
                  {sections.MEASURE.map((m,i)=>(
                    <div key={i}>{m}</div>
                  ))}
                </div>
              </div>
            )}
            {sections.EXPERT.length>0&&(
              <div className="step-row">
                <div className="step-badge" style={{background:'var(--teal)'}}>{t.steps[2]}</div>
                <div className="step-text">{sections.EXPERT.join(' ')}</div>
              </div>
            )}
            {sections.RND.length>0&&(
              <div className="step-row">
                <div className="step-badge" style={{background:'var(--orange)'}}>{t.steps[3]}</div>
                <div className="step-text">{sections.RND.join(' ')}</div>
              </div>
            )}
          </>
        ):(
          <div style={{fontSize:'.85rem',lineHeight:1.6,whiteSpace:'pre-wrap'}}>{msg.text}</div>
        )}
        <KBAccordion t={t} kb={kb} onAsk={onAsk}/>
      </div>
    );
  }

  return(
    <>
      {/* HEADER */}
      <div className="hdr">
        <div className="hdr-top">
          <div className="hdr-logo">🚨 {t.appName}<span>{t.appSub}</span></div>
          <div className="hdr-actions">
            <select className="lang-sel" value={lang} onChange={e=>setLang(e.target.value)}>
              <option value="ko">🇰🇷 한국어</option>
              <option value="en">🇺🇸 English</option>
              <option value="ja">🇯🇵 日本語</option>
              <option value="zh">🇨🇳 中文</option>
              <option value="vi">🇻🇳 Tiếng Việt</option>
            </select>
          </div>
        </div>
        <div className="dis-tabs">
          {t.disasterTypes.map((d,i)=>{
            const keys=Object.keys(KB);
            const key=keys[i]||keys[0];
            return(
              <div key={d} className={`dis-tab${disaster===key?' active':''}`}
                onClick={()=>setDisaster(key)}>{d}</div>
            );
          })}
        </div>
      </div>

      {/* BODY TABS */}
      <div className="body-tabs">
        {['chat','experts','feedback','history'].map((k,i)=>(
          <div key={k} className={`body-tab${tab===k?' active':''}`} onClick={()=>setTab(k)}>
            {[t.tabChat,t.tabExperts,t.tabFeedback,t.tabHistory][i]}
          </div>
        ))}
      </div>

      {/* CHAT TAB */}
      {tab==='chat'&&(
        <>
          <div className="chat-area" ref={chatRef}>
            {messages.map((m,i)=>(
              <div key={i} className={`msg ${m.role}`}>
                {m.isResult?(
                  <ResultBubble msg={m}/>
                ):(
                  <div className="msg-bubble"
                    style={{whiteSpace:'pre-wrap'}}>{m.text}</div>
                )}
                <div className="msg-time">{m.time}</div>
              </div>
            ))}
            {loading&&(
              <div className="typing">
                <span/><span/><span/>
              </div>
            )}
          </div>
          <div className="chat-input-wrap">
            <div className="attach-row">
              <button className="attach-btn">📷 사진</button>
              <button className="attach-btn">🎙 음성</button>
              <button className="attach-btn" style={{background:'#EBF8FF',color:'var(--blue)',borderColor:'#BEE3F8'}}>
                {disaster} 선택됨
              </button>
            </div>
            <div className="input-row">
              <textarea className="chat-input" rows={1}
                placeholder={t.inputPlaceholder}
                value={input}
                onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}}
              />
              <button className="send-btn" onClick={sendMessage} disabled={loading||!input.trim()}>
                ➤
              </button>
            </div>
          </div>
        </>
      )}

      {/* EXPERTS TAB */}
      {tab==='experts'&&(
        <div className="expert-grid" style={{overflowY:'auto',flex:1}}>
          <div style={{fontSize:'.8rem',color:'var(--gray5)',marginBottom:10}}>
            {disaster} 관련 전문가 {EXPERTS.filter(e=>e.disasters.includes(disaster)).length}명 · 전체 {EXPERTS.length}명
          </div>
          {EXPERTS.filter(e=>e.disasters.includes(disaster)).map(e=>(
            <div key={e.id} className="expert-card" onClick={()=>setModal({item:null,disaster})}>
              <div className="expert-avatar">{e.name[0]}</div>
              <div className="expert-info">
                <div className="expert-name">{e.name} <span className="expert-avail">✅ {t.available}</span></div>
                <div className="expert-spec">{e.spec}</div>
                <div style={{fontSize:'.75rem',color:'var(--gray5)'}}>{e.area} · {e.exp}년</div>
                <div className="expert-tags">
                  {e.disasters.map(d=>(
                    <span key={d} className="expert-tag">{d}</span>
                  ))}
                </div>
              </div>
            </div>
          ))}
          {EXPERTS.filter(e=>!e.disasters.includes(disaster)).length>0&&(
            <>
              <div style={{fontSize:'.78rem',color:'var(--gray5)',margin:'12px 0 8px',fontWeight:600}}>
                기타 전문가
              </div>
              {EXPERTS.filter(e=>!e.disasters.includes(disaster)).map(e=>(
                <div key={e.id} className="expert-card" style={{opacity:.7}} onClick={()=>setModal({item:null,disaster})}>
                  <div className="expert-avatar" style={{background:'linear-gradient(135deg,var(--gray5),var(--gray7))'}}>{e.name[0]}</div>
                  <div className="expert-info">
                    <div className="expert-name">{e.name}</div>
                    <div className="expert-spec">{e.spec}</div>
                    <div style={{fontSize:'.75rem',color:'var(--gray5)'}}>{e.area} · {e.exp}년</div>
                  </div>
                </div>
              ))}
            </>
          )}
        </div>
      )}

      {/* FEEDBACK TAB */}
      {tab==='feedback'&&(
        <div className="fb-list" style={{overflowY:'auto',flex:1}}>
          {feedbacks.length===0?(
            <div className="empty-state">
              <div className="icon">📋</div>
              <p>아직 피드백이 없습니다.<br/>채팅에서 전문가 상담 후<br/>피드백을 남겨보세요.</p>
            </div>
          ):feedbacks.map(fb=>(
            <div key={fb.id} className="fb-item">
              <div className="fb-header">
                <span style={{fontSize:'.82rem',fontWeight:700}}>{fb.expertName} ({fb.expertId})</span>
                <span style={{fontSize:'.75rem',color:'var(--gray5)'}}>{fb.date}</span>
              </div>
              <div style={{fontSize:'.78rem',marginBottom:6}}>
                <span style={{background:'var(--red)',color:'#fff',borderRadius:4,padding:'1px 7px',fontSize:'.7rem'}}>{fb.disaster}</span>
                {' '}{fb.item}
              </div>
              <div className="fb-score">
                {[1,2,3,4,5].map(s=>(
                  <div key={s} className={`score-dot${fb.rating==='good'&&s<=5?' filled':fb.rating==='bad'&&s<=2?' filled':''}`}/>
                ))}
                <span style={{fontSize:'.75rem',marginLeft:6,color:'var(--gray7)'}}>
                  {fb.rating==='good'?'😊 만족':'😞 미흡'}
                </span>
              </div>
              {fb.issues&&fb.issues.length>0&&(
                <div style={{fontSize:'.75rem',color:'var(--gray5)',marginTop:4}}>
                  미흡: {fb.issues.join(', ')}
                </div>
              )}
              {fb.rnd&&(
                <div className="rnd-badge">{t.rndSuggest}: {fb.disaster}</div>
              )}
            </div>
          ))}
        </div>
      )}

      {/* HISTORY TAB */}
      {tab==='history'&&(
        <div className="hist-list" style={{overflowY:'auto',flex:1}}>
          {history.length===0?(
            <div className="empty-state">
              <div className="icon">📁</div>
              <p>{t.noHistory}</p>
            </div>
          ):history.map(h=>(
            <div key={h.id} className="hist-item" onClick={()=>{
              setDisaster(h.disaster);setTab('chat');
              setMessages(p=>[...p,
                {role:'user',text:h.question,time:timeStr()},
                {role:'bot',text:h.answer,time:timeStr(),isResult:true,disaster:h.disaster,kb:KB[h.disaster]||KB['홍수']}
              ]);
            }}>
              <div className="hist-dis">
                <span className="hist-dis-badge">{h.disaster}</span>
              </div>
              <div className="hist-q">{h.question}</div>
              <div className="hist-date">{h.date}</div>
            </div>
          ))}
        </div>
      )}

      {/* MODAL */}
      {modal&&(
        <ExpertModal
          t={t}
          disaster={modal.disaster}
          item={modal.item}
          onClose={()=>setModal(null)}
          onFeedbackSaved={onFeedbackSaved}
        />
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
