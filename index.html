// 합친 전체 KB
const ALL_KB = {...DISASTER_KB, ...WEATHER_KB};
const DISASTER_CATS = Object.keys(DISASTER_KB);
const WEATHER_CATS  = Object.keys(WEATHER_KB);

function detectType(txt){
  const l=txt.toLowerCase();
  for(const [type,info] of Object.entries(ALL_KB)){
    if(info.keywords&&info.keywords.some(k=>l.includes(k))) return type;
  }
  return null;
}

function buildPrompt(type){
  if(!type) return "당신은 재난·기상 AI 전문가입니다. 상황을 분석하고 대응 방안을 한국어로 안내합니다.";
  const kb=ALL_KB[type];
  const pList=kb.patents.map(p=>"[특허 "+p.no+"] "+p.title+" ("+p.applicant+", "+p.year+")").join("\n");
  const paList=kb.papers.map(p=>"[논문] "+p.title+" — "+p.journal+" ("+p.authors+", "+p.year+")").join("\n");
  const lList=kb.laws.map(l=>"[법령] "+l.name+" "+l.article).join("\n");
  return "당신은 재난·기상 AI 전문가입니다. 아래 지식DB(특허·논문·법령)를 반드시 참조하여 분석하고 출처를 명시하세요.\n\n=== 관련 특허 ===\n"+pList+"\n\n=== 관련 논문 ===\n"+paList+"\n\n=== 관련 법령 ===\n"+lList+"\n\n규칙: ① 특허/논문/법령 출처 명시 ② 위험도 판정 ③ 즉각 행동 요령 ④ 전문가 연결 필요 여부를 한국어로 간결하게 답변.";
}

  const [open,setOpen]=useState(null);
  if(!type||!ALL_KB[type]) return null;
  const kb=ALL_KB[type];
  const secs=[
    {key:"patents",icon:"📄",label:"관련 특허",sub:"KIPRIS · AI 답변 근거",color:"#06b6d4"},

  return(
    <div style={{padding:"0 16px 16px"}}>
      <div style={{fontSize:11,color:"#475569",fontWeight:600,marginBottom:8,letterSpacing:.5}}>📂 AI 분석 근거 지식 DB</div>

        <div key={sec.key} style={{background:"#1e293b",borderRadius:12,border:"1px solid "+(open===sec.key?sec.color+"55":"#1e2d45"),overflow:"hidden",marginBottom:6}}>

                      </div>
                    </div>

                  {sec.key==="papers"&&(
                    <div>
                      <div style={{fontSize:11,fontWeight:600,color:"#e2e8f0",lineHeight:1.5,marginBottom:4}}>{item.title}</div>
                      <div style={{fontSize:10,color:sec.color,fontWeight:600}}>{item.journal}</div>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4}}>
                        <div style={{fontSize:10,color:"#475569"}}>{item.authors} · {item.year}</div>
                        {item.expert&&onAskExpert&&(
                          <button onClick={()=>onAskExpert(item.expert,item.title,"논문")}
                            style={{background:"linear-gradient(135deg,#059669,#047857)",border:"none",borderRadius:20,padding:"4px 10px",color:"#fff",fontSize:10,fontWeight:700,cursor:"pointer",flexShrink:0,marginLeft:8,display:"flex",alignItems:"center",gap:4}}>
                            👷 {item.expert}에게 묻기
                          </button>
                        )}
                      </div>
                    </div>
                  )}
                  {sec.key==="laws"&&(
                    <div>
                      <div style={{fontSize:11,fontWeight:700,color:sec.color,marginBottom:3}}>{item.name}</div>
                      <div style={{fontSize:10,color:"#94a3b8",lineHeight:1.5}}>{item.article}</div>
                    </div>
                  )}
                </div>
              ))}
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

// ─── 챗봇 공통 ─────────────────────────────────────────────────────
function ChatBot({cats,label,onGoDetail}){
  const [q,setQ]=useState("");
  const [img,setImg]=useState(null);
  const [listening,setListening]=useState(false);
  const [showInput,setShowInput]=useState(false);
  const [msgs,setMsgs]=useState([{role:"bot",text:"안녕하세요! 재난톡 AI입니다 🚨\n\n"+label+" 상황을 텍스트·사진·음성으로 알려주시면\n특허·논문·법령 DB를 참조하여 분석합니다."}]);
  const [loading,setLoading]=useState(false);
  const endRef=useRef(null);
  const fileRef=useRef(null);
  useEffect(()=>{endRef.current&&endRef.current.scrollIntoView({behavior:"smooth"});},[msgs,loading]);

  const pickImg=(e)=>{
    const f=e.target.files[0]; if(!f)return;
    const rd=new FileReader();
    rd.onload=(ev)=>setImg({url:ev.target.result,base64:ev.target.result.split(",")[1],type:f.type,name:f.name});
    rd.readAsDataURL(f); e.target.value="";
  };
  const startVoice=()=>{
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){alert("음성 인식이 지원되지 않습니다."); return;}
    const r=new SR(); r.lang="ko-KR";
    r.onstart=()=>setListening(true);
    r.onresult=(e)=>{setQ(e.results[0][0].transcript);setListening(false);};
    r.onerror=()=>setListening(false); r.onend=()=>setListening(false); r.start();
  };

  const callAPI=(text,image,type)=>{
    const sysPrompt=buildPrompt(type);
    const content=[];
    if(image)content.push({type:"image",source:{type:"base64",media_type:image.type,data:image.base64}});
    content.push({type:"text",text:text||"이 현장 사진을 분석해주세요."});
    return fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,system:sysPrompt,messages:[{role:"user",content}]})
    }).then(r=>r.json()).then(d=>d.content&&d.content[0]&&d.content[0].text||"");
  };

  const doSend=()=>{
    if(!q.trim()&&!img)return;
    const text=q.trim(),image=img;
    setMsgs(m=>[...m,{role:"user",text:text||"📸 현장 사진",imgUrl:image&&image.url}]);
    setQ(""); setImg(null); setShowInput(false); setLoading(true);
    const detected=detectType(text)||cats[0];
    callAPI(text,image,detected)
      .then(aiText=>{
        const finalType=detectType(aiText)||detected;
        const kb=ALL_KB[finalType];
        setMsgs(m=>[...m,{role:"bot",text:aiText,wtype:finalType,action:()=>onGoDetail(finalType,text||"현장 분석")}]);
      })
      .catch(()=>{
        const kb=ALL_KB[detected];
        setMsgs(m=>[...m,{role:"bot",
          text:kb.icon+" "+detected+" 상황입니다.\n\n[논문] "+kb.papers[0].title+"에 따르면 즉각 대응이 필요합니다.\n[법령] "+kb.laws[0].name+" "+kb.laws[0].article+"에 의거하여 대응하세요.",
          wtype:detected,action:()=>onGoDetail(detected,text||"현장 분석")}]);
      })
      .finally(()=>setLoading(false));
  };

  return(
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 156px)"}}>
      <style>{"@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1.2)}}"}</style>
      {/* 유형 버튼 */}
      <div style={{padding:"10px 16px",borderBottom:"1px solid #1a2744",background:"#0d1526",flexShrink:0}}>
        <div style={{display:"flex",gap:6}}>
          {cats.map(cat=>{const kb=ALL_KB[cat]; return(
            <button key={cat} onClick={()=>onGoDetail(cat,"")}
              style={{flex:1,padding:"8px 2px",background:"#1e293b",border:"1.5px solid "+kb.color+"44",borderRadius:10,cursor:"pointer",textAlign:"center"}}>
              <div style={{fontSize:18,marginBottom:2}}>{kb.icon}</div>
              <div style={{fontSize:10,fontWeight:700,color:kb.color}}>{cat}</div>
            </button>
          );})}
        </div>
      </div>

      {/* 대화창 */}
      <div style={{flex:1,overflowY:"auto",padding:"14px 16px",display:"flex",flexDirection:"column",gap:10}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",gap:8}}>
            {m.role==="bot"&&(
              <div style={{width:30,height:30,borderRadius:"50%",background:"linear-gradient(135deg,#0891b2,#0e7490)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0,marginTop:2}}>🤖</div>
            )}
            <div style={{maxWidth:"80%",display:"flex",flexDirection:"column",gap:5}}>
              {m.imgUrl&&<img src={m.imgUrl} alt="" style={{width:"100%",maxHeight:130,objectFit:"cover",borderRadius:14,border:"2px solid #1e3a5f"}}/>}
              <div style={{padding:"11px 14px",
                borderRadius:m.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",
                background:m.role==="user"?"linear-gradient(135deg,#0891b2,#0284c7)":"#1e293b",
                color:"#f1f5f9",fontSize:12,lineHeight:1.8,
                boxShadow:m.role==="user"?"0 4px 16px #0891b233":"0 2px 8px #00000020",
                whiteSpace:"pre-wrap"}}>
                {m.text}
              </div>
              {m.action&&m.wtype&&ALL_KB[m.wtype]&&(
                <button onClick={m.action}
                  style={{padding:"9px 14px",background:ALL_KB[m.wtype].grad,border:"none",borderRadius:10,color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
                  <span>{ALL_KB[m.wtype].icon}</span>
                  <span>4단계 대응 안내 →</span>
                </button>
              )}
            </div>
          </div>
        ))}
        {/* 첫화면 예시 */}
        {msgs.length===1&&!loading&&(
          <div style={{marginTop:4,display:"flex",flexDirection:"column",gap:7}}>
            <div style={{fontSize:11,color:"#475569",fontWeight:600,marginBottom:2}}>💬 예시 (클릭하면 온톨로지 분석)</div>
            {cats.map((cat,i)=>{const kb=ALL_KB[cat]; return(
              <button key={i} onClick={()=>{
                const ex="현장에서 "+cat+" 상황이 발생했습니다. 대응 방법을 알려주세요.";
                setMsgs(m=>[...m,{role:"user",text:ex}]);
                setLoading(true);
                callAPI(ex,null,cat)
                  .then(aiText=>setMsgs(m=>[...m,{role:"bot",text:aiText,wtype:cat,action:()=>onGoDetail(cat,ex)}]))
                  .catch(()=>setMsgs(m=>[...m,{role:"bot",text:kb.icon+" "+cat+" 상황입니다.\n[논문] "+kb.papers[0].title+" 등을 참조하여 대응하세요.",wtype:cat,action:()=>onGoDetail(cat,ex)}]))
                  .finally(()=>setLoading(false));
              }}
                style={{background:"#1e293b",border:"1px solid "+kb.color+"33",borderRadius:11,padding:"10px 13px",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:9}}>
                <span style={{fontSize:18,flexShrink:0}}>{kb.icon}</span>
                <div>
                  <div style={{fontSize:11,color:kb.color,fontWeight:700,marginBottom:1}}>{cat}</div>
                  <div style={{fontSize:11,color:"#94a3b8"}}>{"현장에서 "+cat+" 상황이 발생했습니다."}</div>
                </div>
              </button>
            );})}
          </div>
        )}
        {loading&&(
          <div style={{display:"flex",gap:8}}>
            <div style={{width:30,height:30,borderRadius:"50%",background:"linear-gradient(135deg,#0891b2,#0e7490)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>🤖</div>
            <div style={{padding:"11px 16px",background:"#1e293b",borderRadius:"18px 18px 18px 4px",display:"flex",flexDirection:"column",gap:3}}>
              <div style={{fontSize:10,color:"#64748b"}}>특허·논문·법령 DB 참조 분석 중...</div>
              <div style={{display:"flex",gap:4}}>{[0,1,2].map(i=><div key={i} style={{width:6,height:6,borderRadius:"50%",background:"#06b6d4",animation:"bounce 1.2s "+i*0.2+"s infinite"}}/>)}</div>
            </div>
          </div>
        )}
        <div ref={endRef}/>
      </div>

      {img&&(
        <div style={{margin:"0 16px 5px",padding:"7px 11px",background:"#1e3a5f",borderRadius:9,display:"flex",alignItems:"center",gap:7,border:"1px solid #06b6d444",flexShrink:0}}>
          <img src={img.url} alt="" style={{width:32,height:32,objectFit:"cover",borderRadius:5}}/>
          <div style={{flex:1}}><div style={{fontSize:11,fontWeight:700,color:"#06b6d4"}}>📎 사진 첨부됨</div><div style={{fontSize:10,color:"#64748b"}}>{img.name}</div></div>
          <button onClick={()=>setImg(null)} style={{background:"transparent",border:"none",color:"#64748b",cursor:"pointer",fontSize:16}}>×</button>
        </div>
      )}
      {showInput&&(
        <div style={{padding:"6px 16px 0",display:"flex",gap:6,flexShrink:0}}>
          <input ref={fileRef} type="file" accept="image/*" onChange={pickImg} style={{display:"none"}}/>
          <button onClick={()=>fileRef.current.click()}
            style={{flex:1,padding:"9px",background:img?"#1e3a5f":"#1e293b",border:"1.5px solid "+(img?"#06b6d4":"#334155"),borderRadius:9,cursor:"pointer",color:img?"#06b6d4":"#94a3b8",fontSize:11,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
            📸 사진
          </button>
          <button onClick={startVoice}
            style={{flex:1,padding:"9px",background:listening?"#3f0d1a":"#1e293b",border:"1.5px solid "+(listening?"#f43f5e":"#334155"),borderRadius:9,cursor:"pointer",color:listening?"#f43f5e":"#94a3b8",fontSize:11,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:4}}>
            {listening?"🔴 듣는 중":"🎤 음성"}
          </button>
        </div>
      )}
      <div style={{padding:"7px 16px 12px",display:"flex",gap:6,alignItems:"center",borderTop:"1px solid #1a2744",flexShrink:0}}>
        <button onClick={()=>setShowInput(v=>!v)}
          style={{width:38,height:38,background:showInput?"#0891b222":"#1e293b",border:"1.5px solid "+(showInput?"#0891b2":"#334155"),borderRadius:9,cursor:"pointer",fontSize:17,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:showInput?"#06b6d4":"#64748b"}}>
          {showInput?"✕":"＋"}
        </button>
        <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")doSend();}}
          placeholder="상황을 입력하세요..."
          style={{flex:1,padding:"9px 13px",background:"#1e293b",border:"1.5px solid #334155",borderRadius:11,color:"#f1f5f9",fontSize:13,outline:"none"}}/>
        <button onClick={doSend}
          style={{width:38,height:38,background:(q.trim()||img)?"linear-gradient(135deg,#0891b2,#0284c7)":"#1e293b",border:"none",borderRadius:9,cursor:"pointer",fontSize:15,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,color:"#fff"}}>
          ↑
        </button>
      </div>
    </div>
  );
}

// ─── 상세 대응 화면 (공통) ─────────────────────────────────────────
function DetailScreen({type,query,isDisaster}){

  const kb=ALL_KB[type]||ALL_KB["홍수"];
  const tabs=isDisaster?["행동","조치","전문가","R&D","지식DB"]:["행동","조치","법령","지식DB"];
  return(
    <div style={{padding:"16px"}}>
      <div style={{background:kb.grad,borderRadius:18,padding:"18px",marginBottom:14,position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",right:-16,top:-16,fontSize:80,opacity:.1}}>{kb.icon}</div>
        <div style={{fontSize:11,color:"rgba(255,255,255,.7)",marginBottom:2}}>온톨로지 기반 AI 분석</div>
        <div style={{fontSize:17,fontWeight:800,color:"#fff",marginBottom:5}}>{kb.icon} {type}</div>

          {["특허 "+kb.patents.length+"건","논문 "+kb.papers.length+"건","법령 "+kb.laws.length+"건"].map(b=>(
            <span key={b} style={{background:"rgba(255,255,255,.2)",color:"#fff",borderRadius:20,padding:"2px 8px",fontSize:9,fontWeight:700}}>{b}</span>
          ))}
        </div>
      </div>

      <div style={{display:"flex",gap:5,marginBottom:12,overflowX:"auto"}}>

          <button key={i} onClick={()=>setTab(i)}
            style={{padding:"7px 10px",background:tab===i?kb.color:"#1e293b",border:"1.5px solid "+(tab===i?kb.color:"#1e2d45"),borderRadius:9,cursor:"pointer",color:tab===i?"#fff":"#64748b",fontSize:11,fontWeight:800,flexShrink:0}}>

          <div key={i} style={{display:"flex",gap:10,alignItems:"flex-start",padding:"7px 0",borderBottom:i<kb.actions.length-1?"1px solid #334155":"none"}}>
            <div style={{width:20,height:20,borderRadius:"50%",background:kb.color+"22",color:kb.color,fontSize:10,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{i+1}</div>
            <span style={{fontSize:12,color:"#cbd5e1",lineHeight:1.6}}>{item}</span>

              <div style={{width:20,height:20,borderRadius:"50%",background:"#f59e0b22",color:"#f59e0b",fontSize:10,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}>{i+1}</div>
              <span style={{fontSize:12,color:"#e2e8f0",lineHeight:1.6,fontWeight:600}}>{typeof item==="string"?item:item.action}</span>
            </div>

              <div style={{marginLeft:30,padding:"6px 10px",background:"#f59e0b11",borderRadius:8,border:"1px solid #f59e0b33",display:"flex",gap:8,alignItems:"flex-start"}}>

            ))}
            {kb.papers.map((p,i)=>(
              <div key={i} style={{background:"#0f172a",borderRadius:9,padding:"9px 11px",border:"1px solid #10b98122"}}>
                <div style={{fontSize:11,fontWeight:600,color:"#e2e8f0",lineHeight:1.4,marginBottom:2}}>{p.title}</div>
                <div style={{fontSize:10,color:"#10b981",fontWeight:600}}>{p.journal}</div>
                <div style={{fontSize:10,color:"#475569",marginTop:1}}>{p.authors} · {p.year}</div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ─── APP ───────────────────────────────────────────────────────────
export default function App(){
  const [mainTab,setMainTab]=useState("disaster");
  const [screen,setScreen]=useState("chat");
  const [selType,setSelType]=useState(null);
  const [selQuery,setSelQuery]=useState("");
  const [expertModal,setExpertModal]=useState(null); // null | {cert,title,source,step,rating,issues}
  const scrollRef=useRef(null);
  useEffect(()=>{ scrollRef.current&&scrollRef.current.scrollTo(0,0); },[screen,mainTab]);

  const goDetail=(type,query)=>{ setSelType(type); setSelQuery(query); setScreen("detail"); };
  const isDisaster=DISASTER_CATS.includes(selType);
  const askExpert=(cert,title,source)=>setExpertModal({cert,title,source,step:"connect"});

  // 피드백 저장
  const saveFeedback=async(modal,rating,issues)=>{
    const record={
      id:"F"+Date.now(),
      ts:new Date().toISOString(),
      type:selType||"미분류",
      cert:modal.cert,
      title:modal.title,
      source:modal.source,
      rating, // "satisfied" | "insufficient"
      issues:issues||[], // ["전문가","정보","속도","기타"]
      rndNeeded: rating==="insufficient"&&issues&&issues.includes("정보"),
    };
    try{
      let logs=[];
      try{ const p=await window.storage.get("feedback-logs"); if(p)logs=JSON.parse(p.value); }catch(e){}
      logs.unshift(record);
      await window.storage.set("feedback-logs",JSON.stringify(logs.slice(0,200)));
      // 미흡 누적 카운트
      const insuf=logs.filter(l=>l.rating==="insufficient").length;
      await window.storage.set("feedback-insufficient-count",String(insuf));
    }catch(e){}
    return record;
  };

  return(
    <div style={{fontFamily:"'Noto Sans KR','Pretendard',sans-serif",background:"#0a0f1e",minHeight:"100vh",display:"flex",justifyContent:"center"}}>
      <style>{"@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap');*{box-sizing:border-box;margin:0;padding:0;}input::placeholder{color:#475569;}button{font-family:inherit;}button:active{opacity:.8;}::-webkit-scrollbar{width:2px;}::-webkit-scrollbar-thumb{background:#334155;}"}</style>
      <div style={{width:"100%",maxWidth:430,background:"#0a0f1e",minHeight:"100vh",display:"flex",flexDirection:"column",position:"relative"}}>

        {/* 헤더 */}
        <div style={{background:"#0d1526",borderBottom:"1px solid #1a2744",padding:"12px 20px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:20,flexShrink:0}}>
          {screen==="detail"
            ?<button onClick={()=>setScreen("chat")} style={{background:"#1e293b",border:"1px solid #334155",borderRadius:9,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:"#94a3b8",fontSize:15}}>←</button>
            :<div style={{width:32,height:32,background:"linear-gradient(135deg,#0891b2,#0284c7)",borderRadius:9,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}}>🚨</div>
          }
          <div style={{flex:1}}>
            <div style={{fontSize:15,fontWeight:900,color:"#f1f5f9",letterSpacing:-.5}}>재난톡</div>
            <div style={{fontSize:10,color:"#475569",marginTop:1}}>온톨로지 기반 · 특허·논문·법령 연계</div>
          </div>
          {screen==="detail"&&selType&&ALL_KB[selType]&&(
            <div style={{background:ALL_KB[selType].color+"22",color:ALL_KB[selType].color,border:"1px solid "+ALL_KB[selType].color+"44",borderRadius:20,padding:"3px 10px",fontSize:11,fontWeight:700}}>
              {ALL_KB[selType].icon} {selType}
            </div>
          )}
        </div>

        {/* 메인 탭 */}
        {screen==="chat"&&(
          <div style={{display:"flex",background:"#0d1526",borderBottom:"1px solid #1a2744",padding:"0 16px",flexShrink:0}}>
            {[["disaster","🏚️ 4대 재난","홍수·화재·산사태·지진"],["weather","🌦️ 기상 재난","폭염·한파·태풍·황사·집중호우"]].map(item=>(
              <button key={item[0]} onClick={()=>setMainTab(item[0])}
                style={{flex:1,padding:"10px 8px",background:"transparent",border:"none",borderBottom:"2px solid "+(mainTab===item[0]?"#06b6d4":"transparent"),cursor:"pointer",textAlign:"center"}}>
                <div style={{fontSize:12,fontWeight:700,color:mainTab===item[0]?"#06b6d4":"#64748b"}}>{item[1]}</div>
                <div style={{fontSize:10,color:mainTab===item[0]?"#0891b2":"#475569",marginTop:1}}>{item[2]}</div>
              </button>
            ))}
          </div>
        )}

        {/* 콘텐츠 */}
        <div ref={scrollRef} style={{flex:1,overflowY:"auto"}}>
          {screen==="chat"&&mainTab==="disaster"&&<ChatBot cats={DISASTER_CATS} label="재난" onGoDetail={goDetail}/>}
          {screen==="chat"&&mainTab==="weather"&&<ChatBot cats={WEATHER_CATS} label="기상" onGoDetail={goDetail}/>}
          {screen==="detail"&&selType&&<DetailScreen type={selType} query={selQuery} isDisaster={isDisaster}/>}
          {screen==="detail"&&selType&&<KnowledgeAccordion type={selType} onAskExpert={askExpert}/>}
        </div>

        {/* 전문가 연결 + 피드백 모달 */}
        {expertModal&&(
          <div style={{position:"absolute",inset:0,background:"#00000090",zIndex:100,display:"flex",alignItems:"flex-end"}}
            onClick={()=>setExpertModal(null)}>
            <div style={{width:"100%",background:"#0d1526",borderRadius:"20px 20px 0 0",padding:"20px 20px 28px",border:"1px solid #1a2744",maxHeight:"85vh",overflowY:"auto"}}
              onClick={e=>e.stopPropagation()}>
              <div style={{width:36,height:4,background:"#334155",borderRadius:2,margin:"0 auto 18px"}}/>

              {/* STEP 1: 전문가 연결 */}
              {expertModal.step==="connect"&&(
                <div>
                  <div style={{fontSize:11,color:"#64748b",marginBottom:5}}>{expertModal.source} 기반 전문가 연결</div>
                  <div style={{fontSize:13,fontWeight:700,color:"#e2e8f0",lineHeight:1.5,marginBottom:14,padding:"10px 12px",background:"#1e293b",borderRadius:10,border:"1px solid #334155"}}>
                    "{expertModal.title}"
                  </div>
                  <div style={{background:"#1e293b",borderRadius:14,padding:"14px",marginBottom:14,border:"1px solid #06b6d444"}}>
                    <div style={{fontSize:11,color:"#06b6d4",fontWeight:700,marginBottom:10}}>👷 추천 기술사</div>
                    <div style={{display:"flex",alignItems:"center",gap:12}}>
                      <div style={{width:44,height:44,borderRadius:12,background:"linear-gradient(135deg,#0891b2,#0e7490)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:"#fff",fontWeight:900,flexShrink:0}}>전</div>
                      <div style={{flex:1}}>
                        <div style={{fontSize:14,fontWeight:800,color:"#f1f5f9"}}>{expertModal.cert}</div>
                        <div style={{fontSize:11,color:"#64748b",marginTop:2}}>한국기술사회 소속 · 관련 분야 전문</div>
                        <div style={{fontSize:11,color:"#f59e0b",marginTop:2}}>★★★★★ 4.9</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:22,fontWeight:900,color:"#10b981"}}>95</div>
                        <div style={{fontSize:10,color:"#64748b"}}>적합도</div>
                      </div>
                    </div>
                  </div>
                  <button onClick={()=>setExpertModal({...expertModal,step:"feedback_request"})}
                    style={{width:"100%",padding:"14px",background:"linear-gradient(135deg,#0891b2,#0284c7)",border:"none",borderRadius:13,color:"#fff",fontSize:14,fontWeight:800,cursor:"pointer",marginBottom:8}}>
                    📞 {expertModal.cert} 상담 연결하기
                  </button>
                  <button onClick={()=>setExpertModal(null)}
                    style={{width:"100%",padding:"10px",background:"transparent",border:"none",color:"#64748b",fontSize:13,cursor:"pointer"}}>
                    닫기
                  </button>
                </div>
              )}

              {/* STEP 2: 상담 완료 후 피드백 요청 */}
              {expertModal.step==="feedback_request"&&(
                <div>
                  <div style={{textAlign:"center",marginBottom:16}}>
                    <div style={{fontSize:36,marginBottom:8}}>💬</div>
                    <div style={{fontSize:16,fontWeight:900,color:"#f1f5f9",marginBottom:4}}>상담이 완료되었습니다</div>
                    <div style={{fontSize:12,color:"#64748b"}}>{expertModal.cert}와의 상담 — 어떠셨나요?</div>
                  </div>
                  <div style={{fontSize:12,color:"#94a3b8",textAlign:"center",marginBottom:14,padding:"8px 12px",background:"#1e293b",borderRadius:10,border:"1px solid #334155"}}>
                    "{expertModal.title}"
                  </div>
                  <div style={{display:"flex",gap:10,marginBottom:10}}>
                    <button onClick={async()=>{
                      await saveFeedback(expertModal,"satisfied",[]);
                      setExpertModal({...expertModal,step:"done_satisfied"});
                    }}
                      style={{flex:1,padding:"16px 8px",background:"#10b98122",border:"2px solid #10b98155",borderRadius:14,cursor:"pointer",textAlign:"center"}}>
                      <div style={{fontSize:28,marginBottom:5}}>😊</div>
                      <div style={{fontSize:13,fontWeight:800,color:"#10b981"}}>만족했어요</div>
                      <div style={{fontSize:10,color:"#64748b",marginTop:2}}>문제가 해결됐어요</div>
                    </button>
                    <button onClick={()=>setExpertModal({...expertModal,step:"feedback_issues",selected:[]})}
                      style={{flex:1,padding:"16px 8px",background:"#f43f5e22",border:"2px solid #f43f5e55",borderRadius:14,cursor:"pointer",textAlign:"center"}}>
                      <div style={{fontSize:28,marginBottom:5}}>😞</div>
                      <div style={{fontSize:13,fontWeight:800,color:"#f43f5e"}}>미흡했어요</div>
                      <div style={{fontSize:10,color:"#64748b",marginTop:2}}>아직 해결이 안 됐어요</div>
                    </button>
                  </div>
                  <button onClick={()=>setExpertModal(null)}
                    style={{width:"100%",padding:"10px",background:"transparent",border:"none",color:"#64748b",fontSize:12,cursor:"pointer"}}>
                    나중에 평가할게요
                  </button>
                </div>
              )}

              {/* STEP 3: 미흡 — 무엇이 미흡했나 */}
              {expertModal.step==="feedback_issues"&&(
                <div>
                  <div style={{textAlign:"center",marginBottom:16}}>
                    <div style={{fontSize:28,marginBottom:8}}>🔍</div>
                    <div style={{fontSize:15,fontWeight:900,color:"#f1f5f9",marginBottom:4}}>무엇이 미흡했나요?</div>
                    <div style={{fontSize:11,color:"#64748b"}}>해당하는 항목을 모두 선택해 주세요</div>
                  </div>
                  {[
                    {key:"전문가",icon:"👷",label:"전문가 전문성",desc:"기대한 것보다 전문 지식이 부족했어요"},
                    {key:"정보",icon:"📄",label:"특허·논문 정보",desc:"관련 기술 정보가 부족하거나 부정확했어요"},
                    {key:"속도",icon:"⏱️",label:"대응 속도",desc:"전문가 연결이 너무 오래 걸렸어요"},
                    {key:"매칭",icon:"🎯",label:"전문가 매칭",desc:"제 문제에 맞는 전문가가 아니었어요"},
                    {key:"기타",icon:"💬",label:"기타",desc:"다른 이유가 있어요"},
                  ].map(item=>{
                    const sel=expertModal.selected||[];
                    const isOn=sel.includes(item.key);
                    return(
                      <button key={item.key}
                        onClick={()=>setExpertModal({...expertModal,selected:isOn?sel.filter(s=>s!==item.key):[...sel,item.key]})}
                        style={{width:"100%",padding:"12px 14px",background:isOn?"#f43f5e18":"#1e293b",border:"1.5px solid "+(isOn?"#f43f5e":"#334155"),borderRadius:12,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:10,marginBottom:8}}>
                        <span style={{fontSize:20,flexShrink:0}}>{item.icon}</span>
                        <div style={{flex:1}}>
                          <div style={{fontSize:13,fontWeight:700,color:isOn?"#f43f5e":"#e2e8f0"}}>{item.label}</div>
                          <div style={{fontSize:11,color:"#64748b",marginTop:1}}>{item.desc}</div>
                        </div>
                        <div style={{width:20,height:20,borderRadius:"50%",background:isOn?"#f43f5e":"#334155",border:"2px solid "+(isOn?"#f43f5e":"#475569"),display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                          {isOn&&<span style={{color:"#fff",fontSize:11,fontWeight:800}}>✓</span>}
                        </div>
                      </button>
                    );
                  })}
                  <button
                    disabled={!(expertModal.selected&&expertModal.selected.length>0)}
                    onClick={async()=>{
                      const rec=await saveFeedback(expertModal,"insufficient",expertModal.selected);
                      setExpertModal({...expertModal,step:"done_insufficient",record:rec});
                    }}
                    style={{width:"100%",padding:"13px",background:(expertModal.selected&&expertModal.selected.length>0)?"#f43f5e":"#334155",border:"none",borderRadius:13,color:"#fff",fontSize:13,fontWeight:800,cursor:"pointer",marginTop:4,marginBottom:8,opacity:(expertModal.selected&&expertModal.selected.length>0)?1:.5}}>
                    피드백 제출하기
                  </button>
                  <button onClick={()=>setExpertModal({...expertModal,step:"feedback_request"})}
                    style={{width:"100%",padding:"10px",background:"transparent",border:"none",color:"#64748b",fontSize:12,cursor:"pointer"}}>
                    ← 뒤로
                  </button>
                </div>
              )}

              {/* STEP 4a: 만족 완료 */}
              {expertModal.step==="done_satisfied"&&(
                <div style={{textAlign:"center",padding:"10px 0"}}>
                  <div style={{fontSize:48,marginBottom:12}}>🎉</div>
                  <div style={{fontSize:17,fontWeight:900,color:"#10b981",marginBottom:8}}>피드백 감사합니다!</div>
                  <div style={{fontSize:13,color:"#64748b",lineHeight:1.7,marginBottom:20}}>
                    만족 피드백이 저장되었습니다.<br/>
                    해결 사례가 DB에 축적되어<br/>다음 사용자에게 더 나은 매칭을 제공합니다.
                  </div>
                  <div style={{background:"#10b98118",border:"1px solid #10b98133",borderRadius:12,padding:"12px",marginBottom:16,display:"flex",alignItems:"center",gap:10}}>

                    <div style={{textAlign:"left"}}>
                      <div style={{fontSize:12,fontWeight:700,color:"#10b981"}}>피드백 DB 저장 완료</div>
                      <div style={{fontSize:11,color:"#64748b",marginTop:1}}>만족 · {expertModal.cert} · {new Date().toLocaleDateString("ko-KR")}</div>
                    </div>
                  </div>
                  <button onClick={()=>setExpertModal(null)}
                    style={{width:"100%",padding:"13px",background:"linear-gradient(135deg,#059669,#047857)",border:"none",borderRadius:13,color:"#fff",fontSize:13,fontWeight:800,cursor:"pointer"}}>
                    확인
                  </button>
                </div>
              )}

              {/* STEP 4b: 미흡 완료 + R&D 제안 */}
              {expertModal.step==="done_insufficient"&&(
                <div style={{textAlign:"center",padding:"10px 0"}}>
                  <div style={{fontSize:44,marginBottom:12}}>📋</div>
                  <div style={{fontSize:16,fontWeight:900,color:"#f43f5e",marginBottom:8}}>미흡 피드백이 접수됐습니다</div>
                  <div style={{fontSize:12,color:"#64748b",lineHeight:1.7,marginBottom:14}}>
                    소중한 의견 감사합니다.<br/>
                    미흡 사항은 DB에 기록되어<br/>매칭 알고리즘 개선에 활용됩니다.
                  </div>
                  {/* 미흡 항목 요약 */}
                  <div style={{background:"#1e293b",borderRadius:12,padding:"12px",marginBottom:14,textAlign:"left",border:"1px solid #334155"}}>
                    <div style={{fontSize:11,color:"#64748b",fontWeight:700,marginBottom:8}}>접수된 미흡 항목</div>
                    {(expertModal.selected||[]).map(s=>(
                      <div key={s} style={{display:"flex",gap:8,alignItems:"center",fontSize:12,color:"#e2e8f0",marginBottom:4}}>
                        <span style={{color:"#f43f5e"}}>●</span>{s}
                      </div>
                    ))}
                  </div>
                  {/* 정보 미흡이면 R&D 제안 */}
                  {(expertModal.selected||[]).includes("정보")&&(
                    <div style={{background:"linear-gradient(135deg,#4c1d9522,#6d28d922)",border:"1px solid #8b5cf644",borderRadius:12,padding:"14px",marginBottom:14,textAlign:"left"}}>
                      <div style={{fontSize:12,fontWeight:800,color:"#a78bfa",marginBottom:6}}>🔬 R&D 과제화 자동 제안</div>
                      <div style={{fontSize:11,color:"#94a3b8",lineHeight:1.6,marginBottom:8}}>
                        특허·논문 정보 미흡이 반복되고 있습니다.<br/>
                        해당 분야 R&D 과제로 전환을 제안합니다.
                      </div>
                      <div style={{fontSize:11,color:"#8b5cf6",fontWeight:700}}>
                        {selType||"재난"} 분야 기술 공백 → NTB 연계 R&D 과제
                      </div>
                    </div>
                  )}
                  <div style={{background:"#f43f5e11",border:"1px solid #f43f5e33",borderRadius:12,padding:"10px",marginBottom:16,display:"flex",alignItems:"center",gap:10,textAlign:"left"}}>
                    <span style={{fontSize:18}}>🗄️</span>
                    <div>
                      <div style={{fontSize:11,fontWeight:700,color:"#f43f5e"}}>미흡 피드백 DB 저장</div>
                      <div style={{fontSize:10,color:"#64748b",marginTop:1}}>매칭 알고리즘 개선 데이터로 활용</div>
                    </div>
                  </div>
                  <button onClick={()=>setExpertModal(null)}
                    style={{width:"100%",padding:"13px",background:"#1e293b",border:"1px solid #334155",borderRadius:13,color:"#94a3b8",fontSize:13,cursor:"pointer"}}>
                    닫기
                  </button>
                </div>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(React.createElement(App));
  </script>
