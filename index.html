<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>재난톡 · 119tok</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#0a1628;color:#f1f5f9;min-height:100vh;}
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:#0a1628;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:2px;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}

/* 헤더 */
#header{background:#0f2040;border-bottom:1px solid #1e3a5f;padding:12px 16px;flex-shrink:0;}
.hdr-top{display:flex;align-items:center;gap:10;margin-bottom:10px;}
.hdr-logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#ff4757,#ff6b2b);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.hdr-title{font-weight:900;font-size:1.1rem;color:#f1f5f9;}
.hdr-sub{font-size:10px;color:#64748b;}
.main-tabs{display:flex;gap:6px;}
.main-tab{flex:1;padding:8px 0;border-radius:10px;cursor:pointer;border:1px solid #2d5a7b;background:#1a3050;color:#94a3b8;font-weight:400;font-size:13px;text-align:center;transition:.15s;font-family:inherit;}
.main-tab.active{border-color:#00D4AA;background:rgba(0,212,170,.12);color:#00D4AA;font-weight:700;}
.main-tab-sub{font-size:10px;margin-top:2px;color:#64748b;}
.main-tab.active .main-tab-sub{color:rgba(0,212,170,.7);}

/* 바디 탭 */
#body-tabs{display:flex;border-bottom:1px solid #1e3a5f;background:#0f2040;flex-shrink:0;}
.body-tab{flex:1;padding:9px 4px;text-align:center;font-size:12px;color:#64748b;border-bottom:2px solid transparent;cursor:pointer;font-weight:400;transition:.15s;font-family:inherit;background:none;border-top:none;border-left:none;border-right:none;}
.body-tab.active{color:#00D4AA;border-bottom-color:#00D4AA;font-weight:700;}

/* 콘텐츠 영역 */
#content{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* 재난 유형 버튼 */
#dis-btns{padding:10px 12px;border-bottom:1px solid #1e3a5f;background:#0f2040;flex-shrink:0;}
.dis-btn-row{display:flex;gap:6px;}
.dis-btn{flex:1;padding:8px 2px;background:#1a3050;border:1px solid rgba(255,255,255,.1);border-radius:10px;cursor:pointer;text-align:center;font-family:inherit;transition:.15s;}
.dis-btn:hover{border-color:rgba(0,212,170,.4);}
.dis-btn-icon{font-size:20px;margin-bottom:2px;}
.dis-btn-label{font-size:10px;font-weight:700;}

/* 채팅 */
#chat-area{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;}
.msg{display:flex;flex-direction:column;max-width:88%;gap:3px;animation:fadeIn .2s ease;}
.msg.user{align-self:flex-end;}
.msg.bot{align-self:flex-start;}
.bubble{padding:10px 14px;font-size:13px;line-height:1.6;white-space:pre-wrap;}
.msg.user .bubble{border-radius:18px 18px 4px 18px;background:#0891b2;color:#f1f5f9;}
.msg.bot .bubble{border-radius:18px 18px 18px 4px;background:#1e293b;color:#f1f5f9;}
.msg-time{font-size:10px;color:#64748b;padding:0 4px;}
.msg.user .msg-time{text-align:right;}

/* 결과 카드 */
.result-card{background:#1a3050;border-radius:12px;padding:12px;margin-top:4px;}
.result-title{font-size:12px;font-weight:700;margin-bottom:8px;}
.step-row{display:flex;gap:8px;margin-bottom:7px;align-items:flex-start;}
.step-badge{border-radius:8px;padding:2px 8px;font-size:11px;font-weight:700;white-space:nowrap;margin-top:1px;flex-shrink:0;}
.step-text{font-size:12px;line-height:1.5;color:#f1f5f9;}

/* 5단계 탭 */
.step-tabs{display:flex;gap:0;margin:10px 0 0;border-radius:8px;overflow:hidden;border:1px solid #2d5a7b;}
.step-tab{flex:1;padding:7px 1px;text-align:center;font-size:10px;cursor:pointer;background:#1a3050;color:#64748b;border:none;font-family:inherit;font-weight:600;transition:.15s;border-right:1px solid #2d5a7b;}
.step-tab:last-child{border-right:none;}
.step-tab.active{color:#0a1628;font-weight:700;}
.step-tab-icon{font-size:13px;display:block;margin-bottom:2px;}
.step-panel{display:none;padding:10px 0 4px;}
.step-panel.active{display:block;}
.step-item{display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid #1e3a5f;font-size:12px;color:#f1f5f9;line-height:1.5;}
.step-item:last-child{border:none;}
.step-num{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;margin-top:1px;}
.law-pill{display:inline-block;background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.3);border-radius:4px;padding:1px 6px;font-size:10px;margin-top:3px;}
.ai-box{margin-top:8px;padding:8px;background:#0f2040;border-radius:8px;font-size:12px;color:#94a3b8;line-height:1.5;}
/* R&D 미흡 체크박스 */
.rnd-issue{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #1e3a5f;font-size:12px;cursor:pointer;}
.rnd-issue:last-child{border:none;}
.rnd-check{width:18px;height:18px;border-radius:4px;border:1.5px solid #2d5a7b;background:#1a3050;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;}
.rnd-check.sel{background:#f97316;border-color:#f97316;color:#fff;}
.rnd-submit{width:100%;margin-top:10px;background:#f97316;color:#fff;border:none;border-radius:10px;padding:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.rnd-done{background:rgba(249,115,22,.12);border:1px solid rgba(249,115,22,.3);border-radius:8px;padding:10px;font-size:12px;color:#fb923c;text-align:center;margin-top:8px;}
.kb-toggle{display:flex;align-items:center;justify-content:space-between;background:#1e3a5f;border:1px solid #2d5a7b;border-radius:8px;padding:8px 12px;cursor:pointer;font-size:12px;font-weight:600;color:#f1f5f9;margin-top:6px;}
.kb-body{border:1px solid #2d5a7b;border-top:none;border-radius:0 0 8px 8px;padding:0 10px;background:#0f2040;display:none;}
.kb-body.open{display:block;}
.kb-row{padding:7px 0;border-bottom:1px solid #1e3a5f;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#f1f5f9;}
.kb-row:last-child{border:none;}
.kb-row-info div:first-child{font-weight:600;}
.kb-row-info div:last-child{font-size:11px;color:#64748b;margin-top:1px;}
.ask-btn{background:#00D4AA;color:#0a1628;border:none;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;font-weight:700;white-space:nowrap;font-family:inherit;}

/* 예시 버튼 */
.example-label{font-size:11px;color:#64748b;font-weight:600;margin-bottom:6px;}
.example-btn{width:100%;background:#1e293b;border-radius:11px;padding:10px 13px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:9px;margin-bottom:6px;font-family:inherit;border:1px solid rgba(255,255,255,.05);}
.example-btn:hover{border-color:rgba(0,212,170,.3);}
.example-cat{font-size:11px;font-weight:700;margin-bottom:1px;}
.example-desc{font-size:11px;color:#94a3b8;}

/* 타이핑 */
.typing{display:flex;gap:4px;padding:10px 14px;background:#1e293b;border-radius:18px 18px 18px 4px;align-self:flex-start;}
.typing span{width:7px;height:7px;border-radius:50%;background:#00D4AA;display:inline-block;opacity:.7;animation:bounce .9s infinite;}

/* 입력창 */
#chat-input-wrap{padding:8px 12px 10px;border-top:1px solid #1e3a5f;background:#0f2040;flex-shrink:0;}
#plus-popup{display:none;gap:8px;margin-bottom:8px;animation:fadeIn .15s ease;}
#plus-popup.show{display:flex;}
.attach-btn{display:flex;align-items:center;gap:5px;background:#1a3050;border:1px solid #2d5a7b;border-radius:20px;padding:6px 13px;font-size:12px;cursor:pointer;color:#94a3b8;font-family:inherit;transition:.15s;}
.attach-btn:hover{border-color:#00D4AA;color:#00D4AA;}
.attach-btn.recording{border-color:#ff4757;color:#ff4757;background:rgba(255,71,87,.1);}
.input-row{display:flex;gap:8px;align-items:flex-end;}
#plus-btn{background:#1a3050;border:1px solid #2d5a7b;border-radius:50%;width:36px;height:36px;cursor:pointer;font-size:1.3rem;color:#94a3b8;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:300;font-family:inherit;transition:.15s;}
#plus-btn:hover{border-color:#00D4AA;color:#00D4AA;}
#plus-btn.open{background:#00D4AA22;border-color:#00D4AA;color:#00D4AA;transform:rotate(45deg);}
#chat-input{flex:1;background:#1a3050;border:1px solid #2d5a7b;border-radius:24px;padding:9px 16px;font-size:13px;font-family:inherit;resize:none;outline:none;color:#f1f5f9;max-height:80px;}
#chat-input::placeholder{color:#64748b;}
#chat-input:focus{border-color:#00D4AA;}
#send-btn{background:#1a3050;color:#64748b;border:none;border-radius:50%;width:36px;height:36px;cursor:pointer;font-weight:900;font-size:1rem;flex-shrink:0;font-family:inherit;transition:.15s;}
#send-btn.active{background:#00D4AA;color:#0a1628;}

/* 전문가 탭 */
#experts-tab{overflow-y:auto;flex:1;padding:12px;}
.expert-count{font-size:12px;color:#64748b;margin-bottom:10px;}
.expert-card{background:#0f2040;border:1px solid #1e3a5f;border-radius:12px;padding:12px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer;}
.expert-avatar{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#0891b2,#00D4AA);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:1.1rem;flex-shrink:0;}
.expert-name{font-weight:700;font-size:14px;color:#f1f5f9;}
.expert-spec{font-size:12px;color:#00D4AA;margin-top:2px;}
.expert-meta{font-size:11px;color:#64748b;margin-top:2px;}
.expert-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.expert-tag{border-radius:4px;padding:1px 6px;font-size:10px;}
.expert-avail{font-size:11px;color:#00c875;margin-left:4px;}

/* 피드백 탭 */
#feedback-tab{overflow-y:auto;flex:1;padding:12px;}
.fb-card{background:#0f2040;border:1px solid #1e3a5f;border-radius:12px;padding:12px;margin-bottom:10px;}
.fb-header{display:flex;justify-content:space-between;margin-bottom:8px;}
.fb-name{font-weight:700;font-size:13px;color:#f1f5f9;}
.fb-date{font-size:11px;color:#64748b;}
.fb-dis{display:inline-block;border-radius:4px;padding:1px 7px;font-size:11px;font-weight:700;color:#0a1628;margin-right:4px;}
.fb-rating{font-size:12px;margin-top:4px;}
.fb-issues{font-size:11px;color:#64748b;margin-top:4px;}
.rnd-badge{background:rgba(255,71,87,.18);border:1px solid rgba(255,71,87,.4);border-radius:6px;padding:3px 8px;font-size:11px;color:#ff4757;margin-top:6px;display:inline-block;}

/* 이력 탭 */
#history-tab{overflow-y:auto;flex:1;padding:12px;}
.hist-card{background:#0f2040;border:1px solid #1e3a5f;border-radius:12px;padding:12px;margin-bottom:10px;cursor:pointer;}
.hist-dis{display:inline-block;border-radius:4px;padding:1px 7px;font-size:11px;font-weight:700;color:#0a1628;margin-bottom:4px;}
.hist-q{font-size:13px;font-weight:600;color:#f1f5f9;margin-bottom:3px;}
.hist-date{font-size:11px;color:#64748b;}

/* 빈 상태 */
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#64748b;padding:40px;}
.empty-icon{font-size:3rem;margin-bottom:12px;}
.empty-text{font-size:13px;text-align:center;line-height:1.6;}

/* 보고서 탭 */
#report-tab{overflow-y:auto;flex:1;padding:12px;}
.report-ctrl{background:linear-gradient(135deg,#0f2040,#1a3050);border:1px solid #2d5a7b;border-radius:12px;padding:14px;margin-bottom:12px;}
.report-ctrl-title{font-size:13px;font-weight:700;color:#f1f5f9;margin-bottom:10px;}
.report-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.report-opt{background:#0a1628;border:1px solid #2d5a7b;border-radius:8px;padding:8px 10px;cursor:pointer;font-size:12px;color:#94a3b8;text-align:center;transition:.15s;font-family:inherit;}
.report-opt.sel{border-color:#00D4AA;background:rgba(0,212,170,.1);color:#00D4AA;font-weight:700;}
.report-gen-btn{width:100%;background:#00D4AA;color:#0a1628;border:none;border-radius:10px;padding:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.report-gen-btn:disabled{background:#1a3050;color:#64748b;}
/* 보고서 본문 */
.report-doc{background:#fff;color:#1a202c;border-radius:12px;padding:20px;font-size:12px;line-height:1.7;margin-top:4px;}
.report-doc h1{font-size:15px;font-weight:900;text-align:center;margin-bottom:4px;color:#0f2040;}
.report-doc h2{font-size:13px;font-weight:700;margin:14px 0 6px;color:#0f2040;border-bottom:2px solid #e2e8f0;padding-bottom:4px;}
.report-doc h3{font-size:12px;font-weight:700;margin:10px 0 4px;color:#2d3748;}
.report-doc .meta{text-align:center;font-size:11px;color:#64748b;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #e2e8f0;}
.report-doc table{width:100%;border-collapse:collapse;margin:8px 0;font-size:11px;}
.report-doc th{background:#0f2040;color:#fff;padding:6px 8px;text-align:left;}
.report-doc td{padding:5px 8px;border-bottom:1px solid #e2e8f0;vertical-align:top;}
.report-doc tr:nth-child(even) td{background:#f7fafc;}
.report-badge{display:inline-block;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:700;color:#fff;margin-right:4px;}
.report-actions{display:flex;gap:8px;margin-top:10px;}
.report-action-btn{flex:1;padding:9px;border-radius:8px;border:1px solid #2d5a7b;background:#1a3050;color:#94a3b8;font-size:12px;cursor:pointer;font-family:inherit;font-weight:600;}
.report-action-btn:hover{border-color:#00D4AA;color:#00D4AA;}

#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:none;align-items:flex-end;justify-content:center;}
#modal-overlay.show{display:flex;}
#modal-sheet{background:#0f2040;border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px;max-height:80vh;overflow-y:auto;animation:slideUp .25s ease;border-top:1px solid #2d5a7b;}
.modal-handle{width:40px;height:4px;background:#2d5a7b;border-radius:2px;margin:0 auto 16px;}
.modal-title{font-weight:700;font-size:1rem;color:#f1f5f9;margin-bottom:4px;}
.modal-sub{font-size:12px;color:#94a3b8;margin-bottom:14px;}
.modal-steps{display:flex;gap:5px;margin-bottom:14px;}
.modal-step{flex:1;height:3px;border-radius:2px;background:#2d5a7b;}
.modal-step.done{background:#00D4AA;}
.modal-expert-card{background:#1a3050;border-radius:10px;padding:14px;display:flex;gap:12px;margin-bottom:16px;border:1px solid #2d5a7b;}
.confirm-btn{width:100%;background:#00D4AA;color:#0a1628;border:none;border-radius:12px;padding:14px;font-size:.95rem;font-weight:700;cursor:pointer;margin-top:12px;font-family:inherit;}
.fb-btn-row{display:flex;gap:10px;margin-top:4px;}
.fb-btn{flex:1;padding:14px;border-radius:12px;cursor:pointer;text-align:center;font-weight:700;font-size:.9rem;font-family:inherit;border:1px solid;}
.issue-chips{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0;}
.issue-chip{padding:7px 14px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid #2d5a7b;background:#1a3050;color:#94a3b8;font-family:inherit;}
.issue-chip.sel{border-color:#00D4AA;background:rgba(0,212,170,.12);color:#00D4AA;font-weight:700;}
</style>
</head>
<body>
<div id="app">
  <!-- 헤더 -->
  <div id="header">
    <div class="hdr-top" style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
      <div class="hdr-logo-icon">🚨</div>
      <div>
        <div class="hdr-title">재난톡 <span style="font-weight:400;font-size:.85rem;color:#64748b;">119tok</span></div>
        <div class="hdr-sub">온톨로지 기반 · 특허·논문·법령 연계</div>
      </div>
    </div>
    <div class="main-tabs">
      <button class="main-tab active" data-tab="4대재난" onclick="switchMain('4대재난',this)">
        🏚️ 4대 재난
        <div class="main-tab-sub">홍수·화재·산사태·지진</div>
      </button>
      <button class="main-tab" data-tab="기상재난" onclick="switchMain('기상재난',this)">
        🌦️ 기상 재난
        <div class="main-tab-sub">폭염·한파·태풍·황사·집중호우</div>
      </button>
    </div>
  </div>

  <!-- 바디 탭 -->
  <div id="body-tabs">
    <button class="body-tab active" onclick="switchTab('chat',this)">💬 채팅</button>
    <button class="body-tab" onclick="switchTab('experts',this)">👷 전문가</button>
    <button class="body-tab" onclick="switchTab('feedback',this)">📋 피드백</button>
    <button class="body-tab" onclick="switchTab('history',this)">📁 이력</button>
    <button class="body-tab" onclick="switchTab('report',this)">📊 보고서</button>
  </div>

  <!-- 콘텐츠 -->
  <div id="content">
    <!-- 채팅 탭 -->
    <div id="chat-tab" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
      <div id="dis-btns">
        <div class="dis-btn-row" id="dis-btn-row"></div>
      </div>
      <div id="chat-area"></div>
      <div id="chat-input-wrap">
        <div id="plus-popup">
          <button class="attach-btn" onclick="document.getElementById('file-input').click()">
            📷 사진
          </button>
          <button class="attach-btn" id="voice-btn" onclick="toggleVoice()">
            🎙 음성
          </button>
          <input id="file-input" type="file" accept="image/*" style="display:none"
            onchange="handlePhoto(event)"/>
        </div>
        <div class="input-row">
          <button id="plus-btn" onclick="togglePlus()">+</button>
          <textarea id="chat-input" placeholder="재난 상황을 입력하세요..." rows="1"
            oninput="updateSendBtn()" onkeydown="handleKey(event)"></textarea>
          <button id="send-btn" onclick="sendMsg()">↑</button>
        </div>
      </div>
    </div>

    <!-- 보고서 탭 -->
    <div id="report-tab" style="display:none;"></div>

    <!-- 전문가 탭 -->
    <div id="experts-tab" style="display:none;overflow-y:auto;flex:1;padding:12px;"></div>

    <!-- 피드백 탭 -->
    <div id="feedback-tab" style="display:none;overflow-y:auto;flex:1;padding:12px;"></div>

    <!-- 이력 탭 -->
    <div id="history-tab" style="display:none;overflow-y:auto;flex:1;padding:12px;"></div>
  </div>
</div>

<!-- 전문가 모달 -->
<div id="modal-overlay" onclick="closeModalOutside(event)">
  <div id="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">👷 전문가 연결</div>
    <div class="modal-sub" id="modal-sub"></div>
    <div class="modal-steps" id="modal-steps">
      <div class="modal-step done"></div>
      <div class="modal-step"></div>
      <div class="modal-step"></div>
      <div class="modal-step"></div>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<script>
// ── 데이터

function tnow(){var d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function cats(){return currentMain==='4대재난'?['홍수','화재','산사태','지진']:['폭염','한파','태풍','황사','집중호우'];}
function detect(t){var c=cats();for(var i=0;i<c.length;i++){var kb=KB[c[i]];if(kb.kw.some(function(w){return t.includes(w);}))return c[i];}return null;}
function getSaved(key){try{return JSON.parse(localStorage.getItem(key)||'[]');}catch(e){return[];}}
function save(key,arr){try{localStorage.setItem(key,JSON.stringify(arr));}catch(e){}}

// ── 전환
function switchMain(name, el){
  currentMain=name;
  document.querySelectorAll('.main-tab').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');
  switchTab('chat', document.querySelectorAll('.body-tab')[0]);
  renderDisBtns();
  renderChat();
}

function switchTab(name, el){
  currentTab=name;
  document.querySelectorAll('.body-tab').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');
  var tabs=['chat','experts','feedback','history','report'];
  tabs.forEach(function(t){
    var el2=document.getElementById(t+'-tab');
    if(el2) el2.style.display=t===name?(t==='chat'?'flex':'block'):'none';
  });
  if(name==='experts')renderExperts();
  if(name==='feedback')renderFeedback();
  if(name==='history')renderHistory();
  if(name==='report')renderReport();
}

// ── 재난 버튼
function renderDisBtns(){
  var row=document.getElementById('dis-btn-row');
  row.innerHTML='';
  cats().forEach(function(cat){
    var kb=KB[cat];
    var btn=document.createElement('button');
    btn.className='dis-btn';
    btn.style.borderColor=kb.col+'44';
    btn.innerHTML='<div class="dis-btn-icon">'+kb.icon+'</div><div class="dis-btn-label" style="color:'+kb.col+'">'+cat+'</div>';
    btn.onclick=function(){sendMsg('현장에서 '+cat+' 상황이 발생했습니다. 대응 방법을 알려주세요.');};
    row.appendChild(btn);
  });
}

var messages=[];

function renderChat(){
  messages=[{role:'bot',text:'안녕하세요! 재난톡 AI입니다 🚨\n\n재난 상황을 텍스트·사진·음성으로 알려주세요.\n특허·논문·법령 DB를 참조하여 분석합니다.',time:tnow()}];
  renderMessages();
}

function renderMessages(){
  var area=document.getElementById('chat-area');
  area.innerHTML='';
  messages.forEach(function(m){
    if(m.isResult){
      var div=document.createElement('div');
      div.className='msg bot';
      div.style.animation='fadeIn .2s ease';
      div.appendChild(buildResultCard(m));
      var t=document.createElement('div');
      t.className='msg-time';t.textContent=m.time;
      div.appendChild(t);
      area.appendChild(div);
    } else {
      var div=document.createElement('div');
      div.className='msg '+m.role;
      div.style.animation='fadeIn .2s ease';
      if(m.imgUrl){var img=document.createElement('img');img.src=m.imgUrl;img.style.cssText='width:100%;max-height:130px;object-fit:cover;border-radius:14px;';div.appendChild(img);}
      var b=document.createElement('div');b.className='bubble';b.textContent=m.text;div.appendChild(b);
      var t=document.createElement('div');t.className='msg-time';t.textContent=m.time;div.appendChild(t);
      area.appendChild(div);
    }
  });
  // 예시 (첫화면)
  if(messages.length===1&&!busy){
    var label=document.createElement('div');label.className='example-label';label.textContent='💬 예시 (클릭하면 온톨로지 분석)';

      area.appendChild(btn);
    });

  if(busy){
    var t=document.createElement('div');t.className='typing';
    for(var i=0;i<3;i++){var s=document.createElement('span');s.style.animationDelay=(i*200)+'ms';t.appendChild(s);}

  }
  area.scrollTop=area.scrollHeight;
}

function buildResultCard(m){

function buildKB(kb, dis){
  var wrap=document.createElement('div');wrap.style.marginTop='8px';
  var sections=[['📋 관련 특허',kb.patents,'a','t'],['📄 관련 논문',kb.papers,'j','t'],['⚖️ 관련 법령',kb.laws,'d','t']];
  sections.forEach(function(s, si){
    var body=document.createElement('div');body.className='kb-body';
    var toggle=document.createElement('div');toggle.className='kb-toggle';
    toggle.innerHTML=s[0]+' ('+s[1].length+')<span>▼</span>';
    toggle.onclick=function(){body.classList.toggle('open');toggle.querySelector('span').textContent=body.classList.contains('open')?'▲':'▼';};
    s[1].forEach(function(item){
      var row=document.createElement('div');row.className='kb-row';
      var info=document.createElement('div');info.className='kb-row-info';
      info.innerHTML='<div>'+item.t+'</div><div>'+(item[s[2]]||'')+'</div>';
      row.appendChild(info);
      if(si<2){
        var btn=document.createElement('button');btn.className='ask-btn';btn.textContent='👷 기술사';
        (function(it){btn.onclick=function(){openModal(dis,it);};})(item);
        row.appendChild(btn);
      }
      body.appendChild(row);
    });
    wrap.appendChild(toggle);wrap.appendChild(body);
  });
  return wrap;
}

/* ══════════════════════════════════════
   학습 시스템 (Learning Engine)
   사고→분석→피드백→R&D→KB 진화
══════════════════════════════════════ */

// 학습 데이터 요약 — system prompt에 주입
function buildLearningContext(dis){
  var ctx='';

  // 1. 피드백 DB — 미흡 패턴 학습
  var fbs=getSaved('fbDB').filter(function(f){return f.disaster===dis;});
  if(fbs.length){
    var issueCount={};
    fbs.forEach(function(f){
      if(f.issues)f.issues.forEach(function(i){issueCount[i]=(issueCount[i]||0)+1;});
    });
    var topIssues=Object.entries(issueCount).sort(function(a,b){return b[1]-a[1];}).slice(0,3);
    if(topIssues.length){
      ctx+='\n[학습된 미흡 패턴] ';
      ctx+=topIssues.map(function(i){return i[0]+'('+i[1]+'건)';}).join(', ');
      ctx+=' → 이 부분을 보완하여 답변하세요.';
    }
    var badCount=fbs.filter(function(f){return f.rating==='bad';}).length;
    var goodCount=fbs.filter(function(f){return f.rating==='good';}).length;
    ctx+='\n[누적 만족도] 만족 '+goodCount+'건 / 미흡 '+badCount+'건';
  }

  // 2. R&D DB — 미해결 과제 반영
  var rnds=getSaved('rndDB').filter(function(r){return r.disaster===dis;});
  if(rnds.length){
    var rndIssues=[];
    rnds.forEach(function(r){if(r.issues)rndIssues=rndIssues.concat(r.issues);});
    var unique=[...new Set(rndIssues)];
    ctx+='\n[미해결 R&D 과제] '+unique.join(', ')+' → 관련 최신 연구·기술을 우선 언급하세요.';
  }

  // 3. 상담 이력 — 반복 이슈 패턴
  var hist=getSaved('histDB').filter(function(h){return h.disaster===dis;});
  if(hist.length>=3){
    ctx+='\n[반복 상담 이슈] 이 재난유형으로 '+hist.length+'건 누적. 자주 묻는 상황에 대해 더 구체적으로 답변하세요.';
  }

  // 4. 사용자 학습 KB — 직접 추가된 지식
  var userKB=getSaved('userKB').filter(function(k){return k.dis===dis;});
  if(userKB.length){
    ctx+='\n[현장 전문가 추가 지식]\n';
    userKB.forEach(function(k){ctx+='- '+k.content+'\n';});
  }

  return ctx;
}

// 학습 통계 반환
function getLearningStats(){
  var fbs=getSaved('fbDB');
  var rnds=getSaved('rndDB');
  var hist=getSaved('histDB');
  var userKB=getSaved('userKB');
  return {
    totalConsult: hist.length,
    totalFeedback: fbs.length,
    satisfactionRate: fbs.length ? Math.round(fbs.filter(function(f){return f.rating==='good';}).length/fbs.length*100) : 0,
    rndCount: rnds.length,
    userKBCount: userKB.length,
    evolveLevel: Math.floor((fbs.length+rnds.length*2+userKB.length*3)/10)+1,
  };
}

async function sendMsg(pretext){
  var t=(pretext||document.getElementById('chat-input').value).trim();
  if(!t||busy)return;
  messages.push({role:'user',text:t,time:tnow()});
  document.getElementById('chat-input').value='';
  updateSendBtn();busy=true;renderMessages();

  var dis=detect(t)||cats()[0];
  var kb=KB[dis];

  // 이력 저장
  var hist=getSaved('histDB');
  hist.unshift({id:'H'+Date.now(),disaster:dis,question:t,date:new Date().toLocaleDateString('ko-KR')});
  if(hist.length>200)hist=hist.slice(0,200);
  save('histDB',hist);

  // 학습 컨텍스트 생성
  var learnCtx=buildLearningContext(dis);
  var stats=getLearningStats();

  var sys='당신은 재난 대응 전문 AI입니다. 재난유형: '+dis
    +'\n\n[지식 DB]\n'
    +'특허: '+kb.patents.map(function(p){return p.id+' '+p.t;}).join(', ')+'\n'
    +'논문: '+kb.papers.map(function(p){return p.id+' '+p.t;}).join(', ')+'\n'
    +'법령: '+kb.laws.map(function(l){return l.t+' ('+l.d+')';}).join(', ')
    +'\n\n[진화 수준: Lv.'+stats.evolveLevel+' | 누적상담 '+stats.totalConsult+'건 | 만족도 '+stats.satisfactionRate+'%]'
    +learnCtx
    +'\n\n[응답 형식]\n'
    +'##ACTION: 즉각행동 요령 (번호 목록)\n'
    +'##MEASURE: 조치사항 (법령 출처 포함)\n'
    +'##EXPERT: 추천 전문가 분야\n'
    +'##RND: R&D 필요 분야\n\n'
    +'학습된 미흡 패턴을 반드시 보완하여 답변하세요. 출처는 위 DB의 ID를 명시하세요.';

  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:sys,
        messages:[{role:'user',content:t}]})
    });
    var d=await res.json();
    var reply=d.content&&d.content[0]?d.content[0].text:'응답 오류';
    messages.push({role:'bot',text:reply,time:tnow(),isResult:true,dis:dis,kb:kb,stats:stats});
  }catch(e){
    messages.push({role:'bot',text:'API 오류. Claude API Key를 확인하세요.',time:tnow()});
  }
  busy=false;renderMessages();
}

var recognizing=false;
function toggleVoice(){
  var btn=document.getElementById('voice-btn');
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){
    alert('이 브라우저는 음성 입력을 지원하지 않습니다.');return;
  }
  if(recognizing){recognizing=false;btn.classList.remove('recording');btn.innerHTML='🎙 <span>음성</span>';return;}
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  var rec=new SR();
  rec.lang='ko-KR';rec.interimResults=false;rec.maxAlternatives=1;
  rec.onstart=function(){recognizing=true;btn.classList.add('recording');btn.innerHTML='🔴 <span>듣는 중...</span>';};
  rec.onresult=function(e){
    var txt=e.results[0][0].transcript;
    document.getElementById('chat-input').value=txt;
    updateSendBtn();
  };
  rec.onend=function(){recognizing=false;btn.classList.remove('recording');btn.innerHTML='🎙 <span>음성</span>';};
  rec.onerror=function(){recognizing=false;btn.classList.remove('recording');btn.innerHTML='🎙 <span>음성</span>';};
  rec.start();
}

function updateSendBtn(){
  var v=document.getElementById('chat-input').value.trim();
  var btn=document.getElementById('send-btn');
  btn.classList.toggle('active',!!v&&!busy);
}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}

function renderExperts(){
  var tab=document.getElementById('experts-tab');
  tab.innerHTML='';

async function generateReport(btn){
  btn.disabled=true;btn.textContent='⏳ AI 보고서 작성 중...';
  var tab=document.getElementById('report-tab');

  // 데이터 수집
  var hist=getSaved('histDB');
  var fbs=getSaved('fbDB');
  var rnds=getSaved('rndDB');
  var userKB=getSaved('userKB');
  var stats=getLearningStats();

  // 기간 필터
  var now=new Date();
  var filtered=hist.filter(function(h){
    var d=new Date(h.date);
    if(reportSelections.period==='today')return h.date===now.toLocaleDateString('ko-KR');
    if(reportSelections.period==='week'){var w=new Date(now);w.setDate(w.getDate()-7);return d>=w;}
    if(reportSelections.period==='month'){var m=new Date(now);m.setMonth(m.getMonth()-1);return d>=m;}
    return true;
  });

  // 유형 필터
  if(reportSelections.types.length){
    filtered=filtered.filter(function(h){return reportSelections.types.indexOf(h.disaster)>-1;});
  }

  // 통계 집계
  var disCount={};
  filtered.forEach(function(h){disCount[h.disaster]=(disCount[h.disaster]||0)+1;});
  var fbFiltered=fbs.filter(function(f){
    if(reportSelections.types.length&&reportSelections.types.indexOf(f.disaster)<0)return false;
    return true;
  });
  var goodCnt=fbFiltered.filter(function(f){return f.rating==='good';}).length;
  var badCnt=fbFiltered.filter(function(f){return f.rating==='bad';}).length;
  var issueAgg={};
  fbFiltered.forEach(function(f){if(f.issues)f.issues.forEach(function(i){issueAgg[i]=(issueAgg[i]||0)+1;});});
  var topIssues=Object.entries(issueAgg).sort(function(a,b){return b[1]-a[1];}).slice(0,5);
  var rndList=rnds.filter(function(r){return !reportSelections.types.length||reportSelections.types.indexOf(r.disaster)>-1;});

  var periodLabel={'today':'오늘','week':'이번 주','month':'이달','all':'전체'}[reportSelections.period];
  var formatLabel={'standard':'표준 보고서','brief':'요약 보고서','rnd':'R&D 중점 보고서','official':'공문 형식 보고서'}[reportSelections.format];

  // AI 보고서 생성 프롬프트
  var prompt='다음 재난 대응 플랫폼 데이터를 기반으로 '+formatLabel+'를 작성하세요.\n\n'
    +'[보고 기간] '+periodLabel+' ('+now.toLocaleDateString('ko-KR')+')\n'
    +'[총 상담 건수] '+filtered.length+'건\n'
    +'[재난 유형별] '+Object.entries(disCount).map(function(e){return e[0]+' '+e[1]+'건';}).join(', ')+'\n'
    +'[만족도] 만족 '+goodCnt+'건 / 미흡 '+badCnt+'건 (만족률 '+(fbFiltered.length?Math.round(goodCnt/fbFiltered.length*100):0)+'%)\n'
    +'[주요 미흡 항목] '+topIssues.map(function(i){return i[0]+'('+i[1]+'건)';}).join(', ')+'\n'
    +'[R&D 과제 등록] '+rndList.length+'건\n'
    +'[현장 KB 추가] '+userKB.length+'건\n'
    +'[AI 진화 레벨] Lv.'+stats.evolveLevel+'\n\n';

  if(reportSelections.format==='official'){
    prompt+='공문 형식으로 작성 (수신: 관련 기관, 제목, 본문 1~3항, 붙임 포함)\n';
  } else if(reportSelections.format==='brief'){
    prompt+='요약 형식 (300자 이내, 핵심 수치와 조치 사항만)\n';
  } else if(reportSelections.format==='rnd'){
    prompt+='R&D 과제 도출에 집중 (문제점→R&D 방향→기대효과 구조)\n';
  } else {
    prompt+='표준 보고서 형식: 1.개요 2.상황분석 3.대응현황 4.문제점 5.향후조치 6.R&D 제언\n';
  }
  prompt+='한국어로 전문적이고 간결하게 작성. 실제 수치를 반드시 포함.';

  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,
        messages:[{role:'user',content:prompt}]})
    });
    var d=await res.json();
    var reportText=d.content&&d.content[0]?d.content[0].text:'보고서 생성 오류';

    // 보고서 저장
    var title=periodLabel+' '+formatLabel+' ('+now.toLocaleDateString('ko-KR')+')';
    var reportData={id:'RPT'+Date.now(),title:title,format:formatLabel,date:now.toLocaleDateString('ko-KR'),
      content:reportText,stats:{total:filtered.length,good:goodCnt,bad:badCnt,rnd:rndList.length}};
    var saved=getSaved('reportDB');saved.unshift(reportData);
    if(saved.length>20)saved=saved.slice(0,20);
    save('reportDB',saved);

    showReportDoc(reportData, tab);
  }catch(e){
    btn.disabled=false;btn.textContent='📊 AI 보고서 생성';
    alert('API 오류. API Key를 확인하세요.');
    return;
  }
  btn.disabled=false;btn.textContent='📊 AI 보고서 생성';
}

function showReportDoc(r, container){
  // 기존 보고서 제거
  var old=document.getElementById('report-doc-area');
  if(old)old.remove();

  var wrap=document.createElement('div');
  wrap.id='report-doc-area';
  wrap.style.marginTop='8px';

  var doc=document.createElement('div');
  doc.className='report-doc';

  // 헤더
  doc.innerHTML='<h1>재난 대응 상황 보고서</h1>'
    +'<div class="meta">작성일시: '+r.date+' &nbsp;|&nbsp; 형식: '+r.format+'<br>'
    +'총 상담: '+r.stats.total+'건 &nbsp;|&nbsp; 만족률: '+(r.stats.total?Math.round(r.stats.good/(r.stats.good+r.stats.bad)*100)||0:0)+'% &nbsp;|&nbsp; R&D: '+r.stats.rnd+'건</div>';

  // 본문 — 마크다운 → HTML 간단 변환
  var body=r.content
    .replace(/^#{1}\s(.+)$/gm,'<h2>$1</h2>')
    .replace(/^#{2,3}\s(.+)$/gm,'<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^[-•]\s(.+)$/gm,'<li style="margin-left:14px">$1</li>')
    .replace(/\n\n/g,'</p><p style="margin:6px 0">')
    .replace(/\n/g,'<br>');
  doc.innerHTML+=body;

  // 액션 버튼
  var actions=document.createElement('div');
  actions.className='report-actions';

  var printBtn=document.createElement('button');
  printBtn.className='report-action-btn';printBtn.textContent='🖨️ 인쇄';
  printBtn.onclick=function(){
    var w=window.open('','_blank');
    w.document.write('<html><head><title>재난 보고서</title><style>body{font-family:sans-serif;padding:30px;font-size:13px;line-height:1.7}h1{text-align:center}h2{border-bottom:2px solid #ccc;padding-bottom:4px}table{width:100%;border-collapse:collapse}td,th{border:1px solid #ccc;padding:6px}</style></head><body>'+doc.innerHTML+'</body></html>');
    w.document.close();w.print();
  };

  var copyBtn=document.createElement('button');
  copyBtn.className='report-action-btn';copyBtn.textContent='📋 복사';
  copyBtn.onclick=function(){
    navigator.clipboard.writeText(r.content).then(function(){
      copyBtn.textContent='✅ 복사됨';setTimeout(function(){copyBtn.textContent='📋 복사';},2000);
    });
  };

  var shareBtn=document.createElement('button');
  shareBtn.className='report-action-btn';shareBtn.textContent='📤 공유';
  shareBtn.onclick=function(){
    if(navigator.share){navigator.share({title:'재난 상황 보고서',text:r.content});}
    else{copyBtn.click();}
  };

  actions.appendChild(printBtn);actions.appendChild(copyBtn);actions.appendChild(shareBtn);

  wrap.appendChild(doc);
  wrap.appendChild(actions);
  if(container){container.appendChild(wrap);}
  else{document.getElementById('report-tab').appendChild(wrap);}
}

function showSavedReport(r){
  var old=document.getElementById('report-doc-area');if(old)old.remove();
  showReportDoc(r,null);
  document.getElementById('report-doc-area').scrollIntoView({behavior:'smooth'});
}

function openModal(dis, item){
  modalDis=dis;modalItem=item;modalStep=1;modalRating='';modalIssues=[];
  document.getElementById('modal-sub').textContent=dis+(item?' · '+item.t:'');
  document.getElementById('modal-overlay').classList.add('show');
  renderModal();
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('show');}
function closeModalOutside(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

function renderModal(){
  var steps=document.querySelectorAll('.modal-step');
  steps.forEach(function(s,i){s.classList.toggle('done',i<modalStep);});
  var exp=EXPERTS.find(function(e){return e.cats.includes(modalDis);})||EXPERTS[0];
  var body=document.getElementById('modal-body');
  body.innerHTML='';
  if(modalStep===1){
    body.innerHTML='<div class="modal-expert-card"><div class="expert-avatar">'+exp.n[0]+'</div><div><div class="expert-name">'+exp.n+' <span style="font-size:11px;color:#00c875;">✅ 상담 가능</span></div><div class="expert-spec">'+exp.s+'</div><div style="font-size:11px;color:#64748b;margin-top:3px;">'+exp.area+' · 경력 '+exp.exp+'년</div></div></div>';
    var btn=document.createElement('button');btn.className='confirm-btn';btn.textContent='상담 연결 →';
    btn.onclick=function(){modalStep=2;renderModal();};
    body.appendChild(btn);
  } else if(modalStep===2){
    var p=document.createElement('div');p.style.cssText='font-weight:700;color:#f1f5f9;margin-bottom:12px;';p.textContent='상담 만족도';body.appendChild(p);
    var row=document.createElement('div');row.className='fb-btn-row';
    [['😊 만족','#00c875','good'],['😞 미흡','#ff4757','bad']].forEach(function(b){
      var btn=document.createElement('button');btn.className='fb-btn';
      btn.style.cssText='border-color:'+b[1]+'44;background:'+b[1]+'11;color:'+b[1];
      btn.textContent=b[0];
      btn.onclick=function(){modalRating=b[2];if(b[2]==='good'){submitFeedback();modalStep=4;renderModal();}else{modalStep=3;renderModal();}};
      row.appendChild(btn);
    });
    body.appendChild(row);
  } else if(modalStep===3){
    var p=document.createElement('div');p.style.cssText='font-weight:700;color:#f1f5f9;margin-bottom:8px;';p.textContent='미흡한 부분';body.appendChild(p);
    var chips=document.createElement('div');chips.className='issue-chips';
    ['전문성','정보','속도','매칭','기타'].forEach(function(iss){
      var chip=document.createElement('button');chip.className='issue-chip'+(modalIssues.includes(iss)?' sel':'');
      chip.textContent=iss;
      chip.onclick=function(){
        var idx=modalIssues.indexOf(iss);
        if(idx>-1)modalIssues.splice(idx,1);else modalIssues.push(iss);
        chip.classList.toggle('sel');
      };
      chips.appendChild(chip);
    });
    body.appendChild(chips);
    var btn=document.createElement('button');btn.className='confirm-btn';btn.textContent='제출';
    btn.onclick=function(){submitFeedback();modalStep=4;renderModal();};
    body.appendChild(btn);
  } else {
    body.innerHTML='<div style="text-align:center;padding:20px 0"><div style="font-size:2.5rem;margin-bottom:12px">✅</div><div style="font-weight:700;color:#f1f5f9;margin-bottom:8px">피드백 감사합니다!</div>'
      +(modalRating==='bad'&&modalIssues.length?'<div class="rnd-badge">💡 R&D 제안: '+modalDis+'</div>':'')+'</div>';
    var btn=document.createElement('button');btn.className='confirm-btn';btn.textContent='닫기';
    btn.onclick=closeModal;body.appendChild(btn);
  }
}

function submitFeedback(){
  var exp=EXPERTS.find(function(e){return e.cats.includes(modalDis);})||EXPERTS[0];
  var fb={id:'FB'+Date.now(),disaster:modalDis,expert:exp.n,item:modalItem?modalItem.t:'',
    rating:modalRating,issues:modalIssues.slice(),date:new Date().toLocaleDateString('ko-KR'),
    rnd:modalRating==='bad'&&modalIssues.includes('정보')};
  var fbs=getSaved('fbDB');fbs.unshift(fb);save('fbDB',fbs);
}

// ── 초기화
renderDisBtns();
renderChat();
document.getElementById('content').style.display='flex';
document.getElementById('content').style.flexDirection='column';
document.getElementById('content').style.overflow='hidden';
document.getElementById('content').style.flex='1';
</script>
</body>
</html>
